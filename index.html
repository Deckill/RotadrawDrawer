<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Rotadraw Designer</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbar">
  <h1>ROTADRAW</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="mode-canvas" onclick="setMode('canvas')" data-i18n="캔버스">캔버스</button>
  <button class="tb-btn" id="mode-draw" onclick="setMode('draw')" data-i18n="그리기">그리기</button>
  <button class="tb-btn" id="mode-arrange" onclick="setMode('arrange')" data-i18n="배치">배치</button>
  <button class="tb-btn" id="mode-label" onclick="setMode('label')" data-i18n="레이블">레이블</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="document.getElementById('img-input').click()" data-i18n="이미지 불러오기">이미지 불러오기</button>
  <div id="tb-right">
    <button class="tb-btn" onclick="saveProject()" data-i18n="저장">저장</button>
    <button class="tb-btn" onclick="saveProjectAs()" data-i18n="다른 이름으로 저장">다른 이름으로 저장</button>
    <button class="tb-btn" onclick="loadProject()" data-i18n="불러오기">불러오기</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="showExportModal()" data-i18n="내보내기">내보내기</button>
  </div>
</div>
<div id="main">
  <div id="left-panel">
    <div class="panel-section" id="panel-canvas">
      <div class="panel-title" data-i18n="용지 및 캔버스">용지 및 캔버스</div>
      <div class="input-row">
        <label data-i18n="용지 크기">용지 크기</label>
        <select id="pg-size" onchange="onPaperSizeChange(this.value)" style="width:100px;background:#3a3a3c;color:#fff;border:1px solid #555;border-radius:4px;">
          <option value="A4">A4 (210x297)</option>
          <option value="A3">A3 (297x420)</option>
          <option value="Letter">Letter</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div class="input-row"><label data-i18n="너비(mm)">너비(mm)</label><input type="number" id="cv-w" value="210" min="10" max="2000" oninput="onCustomPaperWH('w',this.value)"></div>
      <div class="input-row"><label data-i18n="높이(mm)">높이(mm)</label><input type="number" id="cv-h" value="297" min="10" max="2000" oninput="onCustomPaperWH('h',this.value)"></div>
      <div class="input-row"><label data-i18n="배경색">배경색</label><input type="color" id="cv-bg" value="#ffffff" oninput="render()"></div>
      <button class="tb-btn" style="width:100%;margin-top:5px" onclick="goHome()" data-i18n="원점 복귀 (Home)">원점 복귀 (Home)</button>
      <div class="panel-title" style="margin-top:10px" data-i18n="원">원</div>
      <div class="input-row"><label data-i18n="지름(mm)">지름(mm)</label><input type="number" id="circle-d" value="150" min="5" max="2000" step="0.5" oninput="circleFromInput()"></div>
      <div class="panel-title" style="margin-top:10px" data-i18n="이미지 불투명도">이미지 불투명도</div>
      <div class="input-row">
        <input type="range" id="img-opacity-range" min="0.05" max="1" step="0.05" value="1" oninput="onImgOpacity(this.value)">
        <input type="number" id="img-opacity-num" value="1.00" min="0.05" max="1" step="0.05" style="width:52px;flex:none" oninput="onImgOpacityNum(this.value)">
      </div>
      <div class="panel-title" style="margin-top:10px" data-i18n="도형 크기">도형 크기</div>
      <div class="input-row">
        <input type="range" id="shape-scale-range" min="10" max="300" step="1" value="100" oninput="onShapeScaleRange(this.value)" onchange="onShapeScaleChange()">
        <input type="number" id="shape-scale-num" value="100" min="10" max="300" step="1" style="width:52px;flex:none" oninput="onShapeScaleNum(this.value)" onchange="onShapeScaleChange()">
        <span style="font-size:11px;color:#aaa">%</span>
      </div>
      <div class="panel-title" style="margin-top:10px" data-i18n="선택된 사진 크기">선택된 사진 크기</div>
      <div class="input-row">
        <input type="range" id="img-width-range" min="10" max="1000" step="1" value="100" oninput="onImgWidthRange(this.value)" onchange="onImgWidthChange()">
        <input type="number" id="img-width-num" value="100" min="10" max="1000" step="1" style="width:52px;flex:none" oninput="onImgWidthNum(this.value)" onchange="onImgWidthChange()">
        <span style="font-size:11px;color:#aaa">mm</span>
      </div>
    </div>
    <div class="panel-section" id="panel-draw" style="display:none">
      <div class="panel-title" data-i18n="도구">도구</div>
      <button class="panel-btn active" id="tool-spline" onclick="setDrawTool('spline')" data-i18n="맞춤점 스플라인">맞춤점 스플라인</button>
      <div id="spline-algo-container" style="margin: 5px 0; padding: 4px; background: #1a1a1c; border-radius: 4px;">
        <div style="font-size: 10px; color: #8e8e93; margin-bottom: 4px;" data-i18n="스플라인 종류:">스플라인 종류:</div>
        <div style="display: flex; gap: 4px;">
          <button class="panel-btn active" id="algo-natural" onclick="setSplineAlgo('natural')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;" data-i18n="글로벌">글로벌</button>
          <button class="panel-btn" id="algo-catmull" onclick="setSplineAlgo('catmull')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;" data-i18n="캣물">캣물</button>
          <button class="panel-btn" id="algo-bspline" onclick="setSplineAlgo('bspline')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;" data-i18n="B-스플라인">B-스플라인</button>
        </div>
      </div>
      <button class="panel-btn" id="tool-line" onclick="setDrawTool('line')" data-i18n="직선">직선</button>
      <button class="panel-btn" id="tool-select" onclick="setDrawTool('select')" data-i18n="선택 / 이동">선택 / 이동</button>
      <div class="panel-title" style="margin-top:8px" data-i18n="두께 (mm)">두께 (mm)</div>
      <div class="input-row">
        <input type="range" id="sw-range" min="0.5" max="2" step="0.05" value="1" oninput="onSwRange(this.value)">
        <input type="number" id="sw-num" value="1.00" min="0.5" max="2" step="0.05" style="width:52px;flex:none" oninput="onSwNum(this.value)">
      </div>
      <div class="panel-title" style="margin-top:8px" data-i18n="도형 불투명도">도형 불투명도</div>
      <div class="input-row">
        <input type="range" id="shape-opacity-range" min="0.05" max="1" step="0.05" value="1" oninput="onShapeOpacity(this.value)">
        <input type="number" id="shape-opacity-num" value="1.00" min="0.05" max="1" step="0.05" style="width:52px;flex:none" oninput="onShapeOpacityNum(this.value)">
      </div>
      <div style="display:flex;gap:4px;margin-top:8px">
        <button class="panel-btn" style="flex:1;margin:0" onclick="deleteSelectedShape()" data-i18n="삭제">삭제</button>
        <button class="panel-btn" style="flex:1;margin:0" onclick="clearAllShapes()" data-i18n="전체삭제">전체삭제</button>
      </div>
      <div style="margin-top:8px;font-size:10px;color:#555;line-height:1.7">
        <span data-i18n="help_draw">클릭: 점 추가 · Esc/좌클릭 공간: 완료<br>
        선택모드: 점 클릭 활성화<br>
        우클릭 대칭/자유 모드, 점추가/삭제<br>
        더블클릭 도형 닫기<br>
        Del: 선택 삭제</span>
      </div>
    </div>
    <div class="panel-section" id="panel-arrange" style="display:none">
      <div class="panel-title" data-i18n="배치 도구">배치 도구</div>
      <div style="display:flex; gap:6px; margin-bottom:8px; align-items:center;">
        <label style="font-size:12px; color:#ddd; margin-right:4px;" data-i18n="총 그룹 수">총 그룹 수</label>
        <input type="number" id="random-group-count" value="4" min="2" max="20" style="width:40px; background:#0f3460; border:1px solid #1a4a7a; border-radius:3px; color:#eee; padding:3px; font-size:12px;">
        <button class="panel-btn" onclick="generateRandomLayout()" style="margin:0; padding:4px 8px; flex:1;" data-i18n="랜덤 분산 배치">랜덤 분산 배치</button>
      </div>
      <div class="panel-title" data-i18n="그룹">그룹</div>
      <button class="panel-btn" onclick="addGroup()" data-i18n="새 그룹 생성">+ 그룹 추가</button>
      <div id="group-list" style="margin-top:6px"></div>
      <div style="margin-top:8px;font-size:10px;color:#555;line-height:1.7">
        <span data-i18n="help_arrange">클릭 도형의 그룹 선택<br>
        선택 드래그이동: 그룹 배치<br>
        Ctrl+클릭 새그룹복사<br>
        Esc: 선택 해제</span>
      </div>
    </div>
    <div class="panel-section" id="panel-label" style="display:none">
      <div class="panel-title" data-i18n="레이블 옵션">레이블 옵션</div>
      <div class="input-row" style="margin-bottom:8px">
        <label data-i18n="폰트 크기(mm)">폰트 크기(mm)</label>
        <input type="number" id="label-size" value="4" min="1" max="20" step="0.5" oninput="render()">
      </div>
      <div class="panel-title" data-i18n="그룹 레이블">그룹 레이블</div>
      <div id="label-group-list"></div>
    </div>
  </div>
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="bg-canvas"></canvas>
      <canvas id="main-canvas"></canvas>
    </div>
  </div>
  <div id="right-panel">
    <div class="prop-title" data-i18n="속성">속성</div>
    <div id="props-content" style="color:#555" data-i18n="선택 없음">선택 없음</div>
  </div>
</div>
<div id="statusbar">
  <span id="sb-mode" data-i18n="모드: ">모드: 캔버스</span>
  <span id="sb-pos">x: 0  y: 0 mm</span>
  <span id="sb-info"></span>
  
  <div id="lang-selector" style="margin-left:auto; display:flex; gap:8px; align-items:center; cursor:pointer;">
    <img src="https://flagcdn.com/kr.svg" onclick="setLanguage('ko')" title="한국어" style="height:21px; width:28px; border-radius:2px;">
    <img src="https://flagcdn.com/jp.svg" onclick="setLanguage('ja')" title="日本語" style="height:21px; width:28px; border-radius:2px;">
    <img src="https://flagcdn.com/us.svg" onclick="setLanguage('en')" title="English" style="height:21px; width:28px; border-radius:2px;">
    <img src="https://flagcdn.com/cn.svg" onclick="setLanguage('zh')" title="中文" style="height:21px; width:28px; border-radius:2px;">
  </div>
</div>
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="onImageFileSelected(event)">
<input type="file" id="proj-input" accept=".rdraw,.json" style="display:none" onchange="onProjectLoaded(event)">
<div class="modal-overlay" id="export-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3 data-i18n="내보내기">내보내기</h3>
    <div style="margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;">
      <label for="export-target" style="font-size: 14px; font-weight: 600;" data-i18n="내보내기 대상:">내보내기 대상:</label>
      <select id="export-target" style="padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;">
        <option value="all" data-i18n="전체 (도형+숫자)">전체 (도형+숫자)</option>
        <option value="shapes" data-i18n="도형만 (구멍 뚫기용)">도형만 (구멍 뚫기용)</option>
        <option value="labels" data-i18n="숫자만 (각인용)">숫자만 (각인용)</option>
      </select>
    </div>
    <div style="margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;">
      <label for="export-font" style="font-size: 14px; font-weight: 600;" data-i18n="숫자 스타일:">숫자 스타일:</label>
      <select id="export-font" style="padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;">
        <option value="vector" data-i18n="일반 폰트 곡선 벡터">일반 폰트 곡선 벡터</option>
        <option value="7seg" data-i18n="7-세그먼트 (육각형)">7-세그먼트 (육각형)</option>
      </select>
    </div>
    <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
      <label for="export-count" style="font-size: 14px; font-weight: 600;" data-i18n="핸들 좌측에 도형 수 표시:">핸들 좌측에 도형 수 표시:</label>
      <select id="export-count" style="padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-family: inherit;">
        <option value="yes" data-i18n="표시 켜기">표시 켜기</option>
        <option value="no" data-i18n="표시 끄기">표시 끄기</option>
      </select>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="panel-btn" onclick="exportSVG()" data-i18n="SVG 벡터">SVG 벡터</button>
      <button class="panel-btn" onclick="exportPNG()" data-i18n="PNG (300dpi)">PNG (300dpi)</button>
      <button class="panel-btn" onclick="exportPDF()" data-i18n="PDF">PDF</button>
      <button class="panel-btn" onclick="exportDXF()" data-i18n="DXF">DXF</button>
    </div>
    <div class="modal-btn-row"><button class="btn-secondary" onclick="document.getElementById('export-modal').style.display='none'" data-i18n="닫기">닫기</button></div>
  </div>
</div>
<div id="context-menu" style="display:none; position:fixed; background:#16213e; border:1px solid #0f3460; border-radius:4px; padding:4px; z-index:1001; box-shadow:0 4px 6px rgba(0,0,0,0.5);"></div>
<script src="js/lang.js"></script>
<script src="js/globals.js"></script>
<script src="js/math.js"></script>
<script src="js/geometry.js"></script>
<script src="js/render.js"></script>
<script src="js/tools.js"></script>
<script src="js/ui.js"></script>
<script src="js/export.js"></script>
<script src="js/main.js"></script>
</body>
</html>
