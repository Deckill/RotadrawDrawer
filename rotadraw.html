<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Rotadraw Designer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#topbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
#topbar h1 { font-size: 16px; font-weight: 700; color: #e94560; margin-right: 8px; letter-spacing: 1px; }
.tb-sep { width: 1px; height: 24px; background: #0f3460; margin: 0 4px; }
.tb-btn { padding: 4px 10px; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 4px; color: #ccc; font-size: 12px; cursor: pointer; transition: background .15s; white-space: nowrap; }
.tb-btn:hover { background: #1a5a9a; color: #fff; }
.tb-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
#tb-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
#main { display: flex; flex: 1; overflow: hidden; }
#left-panel { width: 230px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.panel-section { padding: 10px; border-bottom: 1px solid #0f3460; }
.panel-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.panel-btn { width: 100%; padding: 6px 8px; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 4px; color: #ccc; font-size: 12px; cursor: pointer; text-align: left; margin-bottom: 4px; transition: background .15s; }
.panel-btn:hover { background: #1a5a9a; color: #fff; }
.panel-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
.input-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; }
.input-row label { width: 64px; color: #aaa; flex-shrink: 0; font-size: 11px; }
.input-row input[type=number], .input-row input[type=text] { flex: 1; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 3px; color: #eee; padding: 3px 6px; font-size: 12px; min-width: 0; }
.input-row input[type=range] { flex: 1; accent-color: #e94560; min-width: 0; }
.input-row input[type=color] { width: 36px; height: 24px; padding: 1px; border: 1px solid #1a4a7a; border-radius: 3px; background: none; cursor: pointer; }
.val-display { width: 44px; text-align: right; font-size: 11px; color: #aaa; flex-shrink: 0; }
#group-list { display: flex; flex-direction: column; gap: 4px; }
.group-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #0f3460; border-radius: 4px; border: 1px solid #1a4a7a; cursor: pointer; font-size: 12px; }
.group-item:hover { background: #1a5a9a; }
.group-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.group-del { margin-left: auto; color: #666; font-size: 13px; cursor: pointer; padding: 0 2px; }
.group-del:hover { color: #e94560; }
.group-del.locked { color: #333; pointer-events: none; }
#canvas-area { flex: 1; overflow: hidden; position: relative; background: #0d0d1a; }
#canvas-wrapper { position: absolute; }
#bg-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
#main-canvas { position: absolute; top: 0; left: 0; }
#right-panel { width: 190px; background: #16213e; border-left: 1px solid #0f3460; flex-shrink: 0; overflow-y: auto; padding: 10px; font-size: 11px; line-height: 1.7; }
.prop-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
#statusbar { padding: 3px 12px; background: #0f3460; border-top: 1px solid #1a4a7a; font-size: 11px; color: #888; flex-shrink: 0; display: flex; gap: 16px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; min-width: 300px; }
.modal h3 { margin-bottom: 14px; color: #e94560; }
.modal-btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn-primary { padding: 6px 16px; background: #e94560; border: none; border-radius: 4px; color: #fff; font-size: 13px; cursor: pointer; }
.btn-secondary { padding: 6px 16px; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 4px; color: #ccc; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div id="topbar">
  <h1>ROTADRAW</h1>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="mode-canvas" onclick="setMode('canvas')">캔버스</button>
  <button class="tb-btn" id="mode-draw" onclick="setMode('draw')">그리기</button>
  <button class="tb-btn" id="mode-arrange" onclick="setMode('arrange')">배치</button>
  <button class="tb-btn" id="mode-label" onclick="setMode('label')">레이블</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="document.getElementById('img-input').click()">이미지 불러오기</button>
  <div id="tb-right">
    <button class="tb-btn" onclick="saveProject()">저장</button>
    <button class="tb-btn" onclick="saveProjectAs()">다른 이름으로 저장</button>
    <button class="tb-btn" onclick="loadProject()">불러오기</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="showExportModal()">내보내기</button>
  </div>
</div>
<div id="main">
  <div id="left-panel">
    <div class="panel-section" id="panel-canvas">
      <div class="panel-title">용지 및 캔버스</div>
      <div class="input-row">
        <label>용지 크기</label>
        <select id="pg-size" onchange="onPaperSizeChange(this.value)" style="width:100px;background:#3a3a3c;color:#fff;border:1px solid #555;border-radius:4px;">
          <option value="A4">A4 (210x297)</option>
          <option value="A3">A3 (297x420)</option>
          <option value="Letter">Letter</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div class="input-row"><label>너비(mm)</label><input type="number" id="cv-w" value="210" min="10" max="2000" oninput="onCustomPaperWH('w',this.value)"></div>
      <div class="input-row"><label>높이(mm)</label><input type="number" id="cv-h" value="297" min="10" max="2000" oninput="onCustomPaperWH('h',this.value)"></div>
      <div class="input-row"><label>배경색</label><input type="color" id="cv-bg" value="#ffffff" oninput="render()"></div>
      <button class="tb-btn" style="width:100%;margin-top:5px" onclick="goHome()">원점 복귀 (Home)</button>
      <div class="panel-title" style="margin-top:10px">원</div>
      <div class="input-row"><label>지름(mm)</label><input type="number" id="circle-d" value="150" min="5" max="2000" step="0.5" oninput="circleFromInput()"></div>
      <div class="panel-title" style="margin-top:10px">이미지 불투명도</div>
      <div class="input-row">
        <input type="range" id="img-opacity-range" min="0.05" max="1" step="0.05" value="1" oninput="onImgOpacity(this.value)">
        <input type="number" id="img-opacity-num" value="1.00" min="0.05" max="1" step="0.05" style="width:52px;flex:none" oninput="onImgOpacityNum(this.value)">
      </div>
      <div class="panel-title" style="margin-top:10px">도형 크기</div>
      <div class="input-row">
        <input type="range" id="shape-scale-range" min="10" max="300" step="1" value="100" oninput="onShapeScaleRange(this.value)" onchange="onShapeScaleChange()">
        <input type="number" id="shape-scale-num" value="100" min="10" max="300" step="1" style="width:52px;flex:none" oninput="onShapeScaleNum(this.value)" onchange="onShapeScaleChange()">
        <span style="font-size:11px;color:#aaa">%</span>
      </div>
      <div class="panel-title" style="margin-top:10px">선택된 사진 크기</div>
      <div class="input-row">
        <input type="range" id="img-width-range" min="10" max="1000" step="1" value="100" oninput="onImgWidthRange(this.value)" onchange="onImgWidthChange()">
        <input type="number" id="img-width-num" value="100" min="10" max="1000" step="1" style="width:52px;flex:none" oninput="onImgWidthNum(this.value)" onchange="onImgWidthChange()">
        <span style="font-size:11px;color:#aaa">mm</span>
      </div>
    </div>
    <div class="panel-section" id="panel-draw" style="display:none">
      <div class="panel-title">도구</div>
      <button class="panel-btn active" id="tool-spline" onclick="setDrawTool('spline')">맞춤점 스플라인</button>
      <div id="spline-algo-container" style="margin: 5px 0; padding: 4px; background: #1a1a1c; border-radius: 4px;">
        <div style="font-size: 10px; color: #8e8e93; margin-bottom: 4px;">스플라인 종류:</div>
        <div style="display: flex; gap: 4px;">
          <button class="panel-btn active" id="algo-natural" onclick="setSplineAlgo('natural')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;">글로벌</button>
          <button class="panel-btn" id="algo-catmull" onclick="setSplineAlgo('catmull')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;">캣물</button>
          <button class="panel-btn" id="algo-bspline" onclick="setSplineAlgo('bspline')" style="font-size: 10px; margin: 0; padding: 4px; flex: 1;">B-스플라인</button>
        </div>
      </div>
      <button class="panel-btn" id="tool-line" onclick="setDrawTool('line')">직선</button>
      <button class="panel-btn" id="tool-select" onclick="setDrawTool('select')">선택 / 이동</button>
      <div class="panel-title" style="margin-top:8px">두께 (mm)</div>
      <div class="input-row">
        <input type="range" id="sw-range" min="0.5" max="2" step="0.05" value="1" oninput="onSwRange(this.value)">
        <input type="number" id="sw-num" value="1.00" min="0.5" max="2" step="0.05" style="width:52px;flex:none" oninput="onSwNum(this.value)">
      </div>
      <div class="panel-title" style="margin-top:8px">도형 불투명도</div>
      <div class="input-row">
        <input type="range" id="shape-opacity-range" min="0.05" max="1" step="0.05" value="1" oninput="onShapeOpacity(this.value)">
        <input type="number" id="shape-opacity-num" value="1.00" min="0.05" max="1" step="0.05" style="width:52px;flex:none" oninput="onShapeOpacityNum(this.value)">
      </div>
      <div style="display:flex;gap:4px;margin-top:8px">
        <button class="panel-btn" style="flex:1;margin:0" onclick="deleteSelectedShape()">삭제</button>
        <button class="panel-btn" style="flex:1;margin:0" onclick="clearAllShapes()">전체삭제</button>
      </div>
      <div style="margin-top:8px;font-size:10px;color:#555;line-height:1.7">
        클릭: 점 추가 · Esc/좌클릭 공간: 완료<br>
        선택모드: 점 클릭 활성화<br>
        우클릭 대칭/자유 모드, 점추가/삭제<br>
        더블클릭 도형 닫기<br>
        Del: 선택 삭제
      </div>
    </div>
    <div class="panel-section" id="panel-arrange" style="display:none">
      <div class="panel-title">그룹</div>
      <button class="panel-btn" onclick="addGroup()">+ 그룹 추가</button>
      <div id="group-list" style="margin-top:6px"></div>
      <div style="margin-top:8px;font-size:10px;color:#555;line-height:1.7">
        클릭 도형의 그룹 선택<br>
        선택 드래그이동: 그룹 배치<br>
        Ctrl+클릭 새그룹복사<br>
        Esc: 선택 해제
      </div>
    </div>
    <div class="panel-section" id="panel-label" style="display:none">
      <div class="panel-title">레이블</div>
      <div id="label-group-list"></div>
      <div class="input-row" style="margin-top:8px"><label>간격(mm)</label>
        <input type="number" id="label-size" value="4" min="1" max="20" step="0.5" oninput="render()">
      </div>
    </div>
  </div>
  <div id="canvas-area">
    <div id="canvas-wrapper">
      <canvas id="bg-canvas"></canvas>
      <canvas id="main-canvas"></canvas>
    </div>
  </div>
  <div id="right-panel">
    <div class="prop-title">속성</div>
    <div id="props-content" style="color:#555">선택 없음</div>
  </div>
</div>
<div id="statusbar">
  <span id="sb-mode">모드: 캔버스</span>
  <span id="sb-pos">x: 0  y: 0 mm</span>
  <span id="sb-info"></span>
</div>
<input type="file" id="img-input" accept="image/*" style="display:none" onchange="onImageFileSelected(event)">
<input type="file" id="proj-input" accept=".rdraw,.json" style="display:none" onchange="onProjectLoaded(event)">
<div class="modal-overlay" id="export-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>내보내기</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="panel-btn" onclick="exportSVG()">SVG 벡터</button>
      <button class="panel-btn" onclick="exportPNG()">PNG (300dpi)</button>
      <button class="panel-btn" onclick="exportPDF()">PDF</button>
      <button class="panel-btn" onclick="exportDXF()">DXF</button>
    </div>
    <div class="modal-btn-row"><button class="btn-secondary" onclick="document.getElementById('export-modal').style.display='none'">닫기</button></div>
  </div>
</div>
<div id="context-menu" style="display:none; position:fixed; background:#16213e; border:1px solid #0f3460; border-radius:4px; padding:4px; z-index:1001; box-shadow:0 4px 6px rgba(0,0,0,0.5);"></div>
<script>
// --- globals.js --- 
'use strict';
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const MM         = 96 / 25.4;
const EXPORT_MM  = 300 / 25.4;
const SNAP_D     = 2.5;   // mm
const MAX_LBL    = 10;    // mm label offset limit
const GROUP1_ID  = 1;
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let canvasW = 210, canvasH = 297, baseW = 210, baseH = 297;
let circle  = { cx: 105, cy: 148.5, r: 75 };
let images = [];
let bgImage = null;
let nextImgId = 1;
let paperGuide = { cx: 105, cy: 148.5, w: 210, h: 297, rotation: 0, visible: true, size: 'A4' };
let canvDragState = null;
let canvSelType = null; // 'image' or 'paper'
let canvSelId = null; // for image
let canvSelHandle = null;
let canvDragStartPos = null;
let canvDragStartObj = null;
let currentMode = 'canvas';
let drawTool    = 'spline';
/*
  Shape = {
    id, type:'spline'|'line',
    points: [{x,y}],            ??anchor points
    cps: [[cp1,cp2], ...],      ??bezier control points per segment (spline only)
                                   cps[i] = [outHandle of pts[i], inHandle of pts[i+1]]
    closed, strokeWidth, groupId,
    _isCopy?, _origId?
  }
  For LINE type: cps unused, direct line segments.
*/
let shapes = [], nextShapeId = 1;
let groups = [], nextGroupId = 2;
let activeDrawGroupId = GROUP1_ID;
let labels = {};
let strokeWidth = 1.0;
// View
let viewScale = 1, viewOffX = 0, viewOffY = 0;
// Draw state
let drawing = false, drawingShape = null;
// Selection (draw mode)
let selShapeId = null, selPtIdx = null;
// Which handle is active: null | 'in' | 'out'
let selHandle  = null;
let dragState  = null;  // { type:'pt'|'shape'|'cpIn'|'cpOut', ... }
// Undo / Redo
let undoStack = [], redoStack = [];
const MAX_UNDO = 20;
let currentFileHandle = null;
let shapesTransform = { cx: 0, cy: 0, w: 0, h: 0, rotation: 0 };
let transformStartShapes = null;
let lastShapeScaleValue = 100;
function _snapState() {
  return JSON.stringify({
    shapes: JSON.parse(JSON.stringify(shapes)),
    groups: JSON.parse(JSON.stringify(groups)),
    circle: {...circle},
    canvasW, canvasH, baseW, baseH,
    labels: JSON.parse(JSON.stringify(labels)),
    strokeWidth, nextShapeId, nextGroupId,
    paperGuide: JSON.parse(JSON.stringify(paperGuide))
  });
}
function saveSnapshot() {
  const s = _snapState();
  if (undoStack.length > 0 && undoStack[undoStack.length-1] === s) return;
  undoStack.push(s);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}
function _applySnap(snap) {
  const d = JSON.parse(snap);
  shapes = d.shapes; groups = d.groups; circle = d.circle;
  canvasW = d.canvasW; canvasH = d.canvasH;
  baseW = d.baseW||canvasW; baseH = d.baseH||canvasH;
  labels = d.labels||{}; strokeWidth = d.strokeWidth;
  nextShapeId = d.nextShapeId; nextGroupId = d.nextGroupId;
  if (d.paperGuide) Object.assign(paperGuide, d.paperGuide);
  selShapeId=null; selPtIdx=null; dragState=null;
  arrSelShapeId=null; arrDragState=null;
  try {
    document.getElementById('cv-w').value = canvasW;
    document.getElementById('cv-h').value = canvasH;
    document.getElementById('circle-d').value = (circle.r*2).toFixed(1);
    document.getElementById('sw-num').value = strokeWidth.toFixed(2);
    document.getElementById('sw-range').value = strokeWidth;
  } catch(e2) {}
  refreshGroupList();
  setCanvasSize();
  render();
}
function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(_snapState());
  if (redoStack.length > MAX_UNDO) redoStack.shift();
  _applySnap(undoStack.pop());
}
function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(_snapState());
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  _applySnap(redoStack.pop());
}
// Arrange
let arrSelShapeId = null, arrDragState = null;
// Hover
let hoverPtRef = null;
// Label drag
let lblDrag = null;
// Mouse
let _mdMm = null, _hasDragged = false;
// ═══════════════════════════════════════════════
//  CANVAS / VIEW
// ═══════════════════════════════════════════════
const bgCanvas   = document.getElementById('bg-canvas');
const mainCanvas = document.getElementById('main-canvas');
const bgCtx  = bgCanvas.getContext('2d');
const ctx    = mainCanvas.getContext('2d');
const wrapper    = document.getElementById('canvas-wrapper');
const canvasArea = document.getElementById('canvas-area');
function S(mm)  { return mm * MM * viewScale; }
function clientToMm(e) {
  // viewport 기반 캔버스: canvasArea 기준 + viewOffX/Y 보정
  const r = canvasArea.getBoundingClientRect();
  return { x: (e.clientX - r.left - viewOffX)/(MM*viewScale), y: (e.clientY - r.top - viewOffY)/(MM*viewScale) };
}

let _zoomRaf = null;
canvasArea.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  const ns = Math.max(0.08, Math.min(12, viewScale*f));
  const ar = canvasArea.getBoundingClientRect();
  const mx = e.clientX - ar.left, my = e.clientY - ar.top;
  const ratio = ns/viewScale;
  viewOffX = mx - (mx-viewOffX)*ratio;
  viewOffY = my - (my-viewOffY)*ratio;
  viewScale = ns;
  // 캔버스 크기는 뷰포트 고정 - RAF로 render만 호출
  if (!_zoomRaf) {
    _zoomRaf = requestAnimationFrame(() => {
      _zoomRaf = null;
      render();
    });
  }
}, { passive:false });
let _pan=false, _panO=null;
canvasArea.addEventListener('mousedown', e => { if(e.button===1){_pan=true;_panO={x:e.clientX-viewOffX,y:e.clientY-viewOffY};e.preventDefault();} });


// ═══════════════════════════════════════════════
//  GROUPS
// ═══════════════════════════════════════════════
const GCOLORS=['#e94560','#00b4d8','#06d6a0','#ffd166','#a855f7','#f97316','#ec4899','#14b8a6','#84cc16','#f43f5e'];



// Copy system





// ═══════════════════════════════════════════════
//  STROKE WIDTH
// ═══════════════════════════════════════════════


// ═══════════════════════════════════════════════
//  MODES
// ═══════════════════════════════════════════════
const MODE_NAMES={canvas:'캔버스',draw:'그리기',arrange:'배치',label:'레이블'};




// ==========================================
//  HERMITE SPLINE SYSTEM
// ==========================================









// Get visible control points for selected spline segment


let currentCurvature = null;

// ═══════════════════════════════════════════════
//  OFFSET RENDERING HELPERS
// ═══════════════════════════════════════════════
function segNormal(a,b){
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.hypot(dx,dy)||1;
  return{nx:-dy/len,ny:dx/len};
}





function gColor(s){
  const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
  return g?g.color:'#aaa';
}






// ═══════════════════════════════════════════════
//  HIT TESTING
// ═══════════════════════════════════════════════



function hitHandle(pos,s,ptIdx,side){
  if(!s||s.type!=='spline')return false;
  const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
  const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
  const{out:outH,inn:inH}=getHandlePositions(s,ptIdx);
  const h=side==='out'?outH:inH;
  if(!h)return false;
  // 픽셀 기준 반경: 줌 수준에 관계없이 항상 7px (점 10px보다 작아 점 우선순위 자연 보장)
  const thresh = 7 / (MM * viewScale);
  return Math.hypot(pLocal.x-h.x,pLocal.y-h.y)<thresh;
}

document.addEventListener('keydown',e=>{
  // input/textarea에서는 단축키 무시
  if(e.target.matches('input,textarea,select'))return;

  // Ctrl/Cmd 단축키
  if(e.ctrlKey||e.metaKey){
    if(e.key==='z'||e.key==='Z'){
      e.preventDefault();
      if(e.shiftKey)redo(); else undo();
      return;
    }
    if(e.key==='y'||e.key==='Y'){e.preventDefault();redo();return;}
    if(e.key==='s'||e.key==='S'){
      e.preventDefault();
      if(e.shiftKey){
        saveProjectAs();
      } else {
        saveProject();
      }
      return;
    }
    if(e.key==='l'||e.key==='L'){e.preventDefault();loadProject();return;}
    if(e.key==='p'||e.key==='P'){e.preventDefault();showExportModal();return;}
    return;
  }

  if(e.key==='Escape'){
    if(currentMode==='draw')setDrawTool('select');
  }
  if((e.key==='Delete'||e.key==='Backspace')){
    if(currentMode==='draw')deleteSelectedShape();

  if(currentMode==='draw'&&!e.altKey){
    if(e.key==='l'||e.key==='L'){setDrawTool('line');return;}
    if(e.key==='s'||e.key==='S'){setDrawTool('spline');return;}
  }
});

function svgPathD(s){
  // Use bezier curves directly for spline, polyline for line
  if(s.type==='spline'){
    const closed=isShapeClosed(s);
    const rawPts=s.points;
    const rn=rawPts.length;if(rn<2)return null;
    const hw=(s.strokeWidth||strokeWidth)/2;
    // Sample polyline then build offset
    const{pts}=getPolyline(s);
    return svgOffsetPathD(pts,closed,hw);
  }
  const{pts,closed}=getPolyline(s);
  if(pts.length<2)return null;
  return svgOffsetPathD(pts,closed,(s.strokeWidth||strokeWidth)/2);
}

// --- math.js --- 
function rotAround(pos,cx,cy,deg){
  const r=deg*Math.PI/180,dx=pos.x-cx,dy=pos.y-cy;
  return{x:cx+dx*Math.cos(r)-dy*Math.sin(r),y:cy+dx*Math.sin(r)+dy*Math.cos(r)};
}

function solveTridiagonal(A, B, C, D) {
  const n = D.length;
  const cPrime = new Float64Array(n);
  const dPrime = new Float64Array(n);
  const x = new Float64Array(n);

  cPrime[0] = C[0] / A[0];
  dPrime[0] = D[0] / A[0];

  for (let i = 1; i < n; i++) {
    const m = 1.0 / (A[i] - B[i] * cPrime[i - 1]);
    cPrime[i] = C[i] * m;
    dPrime[i] = (D[i] - B[i] * dPrime[i - 1]) * m;
  }

  x[n - 1] = dPrime[n - 1];
  for (let i = n - 2; i >= 0; i--) {
    x[i] = dPrime[i] - cPrime[i] * x[i + 1];
  }
  return x;
}

function solveNaturalCubicSpline(pts, closed) {
  const n = pts.length;
  if (n < 2) return;

  const h = new Float64Array(n);
  for (let i = 0; i < n; i++) {
    const nextIdx = (i + 1) % n;
    h[i] = Math.max(Math.hypot(pts[nextIdx].x - pts[i].x, pts[nextIdx].y - pts[i].y), 1e-5);
  }

  // We will solve for V_i, the velocity at each point.
  // outT_i = V_i * h_i / 3
  // inT_i = -V_i * h_{i-1} / 3

  if (!closed) {
    // Find blocks of non-manual points
    let start = 0;
    while (start < n) {
      if (pts[start].manual) {
        start++;
        continue;
      }
      let end = start;
      while (end + 1 < n && !pts[end + 1].manual) {
        end++;
      }
      
      // We need to solve for V_{start} ... V_{end}
      const cnt = end - start + 1;
      const A = new Float64Array(cnt);
      const B = new Float64Array(cnt);
      const C = new Float64Array(cnt);
      const Dx = new Float64Array(cnt);
      const Dy = new Float64Array(cnt);

      for (let j = 0; j < cnt; j++) {
        const i = start + j;
        if (i === 0) {
          A[j] = 2; B[j] = 0; C[j] = 1;
          Dx[j] = 3 * (pts[1].x - pts[0].x) / h[0];
          Dy[j] = 3 * (pts[1].y - pts[0].y) / h[0];
        } else if (i === n - 1) {
          B[j] = 1; A[j] = 2; C[j] = 0;
          Dx[j] = 3 * (pts[n-1].x - pts[n-2].x) / h[n-2];
          Dy[j] = 3 * (pts[n-1].y - pts[n-2].y) / h[n-2];
        } else {
          B[j] = h[i]; A[j] = 2 * (h[i-1] + h[i]); C[j] = h[i-1];
          const px = 3 * (h[i] * (pts[i].x - pts[i-1].x) / h[i-1] + h[i-1] * (pts[i+1].x - pts[i].x) / h[i]);
          const py = 3 * (h[i] * (pts[i].y - pts[i-1].y) / h[i-1] + h[i-1] * (pts[i+1].y - pts[i].y) / h[i]);
          Dx[j] = px; Dy[j] = py;
        }

        // Apply boundary conditions if neighbors are manual
        if (i > 0 && i === start && pts[i-1].manual) {
          const V_prev_x = 3 * pts[i-1].outT.x / h[i-1];
          const V_prev_y = 3 * pts[i-1].outT.y / h[i-1];
          Dx[j] -= B[j] * V_prev_x;
          Dy[j] -= B[j] * V_prev_y;
          B[j] = 0; // conceptually
        }
        if (i < n - 1 && i === end && pts[i+1].manual) {
          const V_next_x = -3 * pts[i+1].inT.x / h[i];
          const V_next_y = -3 * pts[i+1].inT.y / h[i];
          Dx[j] -= C[j] * V_next_x;
          Dy[j] -= C[j] * V_next_y;
          C[j] = 0; // conceptually
        }
      }

      const Vx = solveTridiagonal(A, B, C, Dx);
      const Vy = solveTridiagonal(A, B, C, Dy);

      for (let j = 0; j < cnt; j++) {
        const i = start + j;
        const vx = Vx[j], vy = Vy[j];
        if (i < n - 1) pts[i].outT = { x: vx * h[i] / 3, y: vy * h[i] / 3 };
        else pts[i].outT = { x: 0, y: 0 };
        
        if (i > 0) pts[i].inT = { x: -vx * h[i-1] / 3, y: -vy * h[i-1] / 3 };
        else pts[i].inT = { x: 0, y: 0 };
      }

      start = end + 1;
    }
  } else {
    // Closed spline handling (using iterative Gauss-Seidel for simplicity)
    const Vx = new Float64Array(n);
    const Vy = new Float64Array(n);
    for (let i = 0; i < n; i++) {
      if (pts[i].manual) {
        Vx[i] = 3 * pts[i].outT.x / h[i];
        Vy[i] = 3 * pts[i].outT.y / h[i];
      } else {
        const prev = pts[(i - 1 + n) % n];
        const next = pts[(i + 1) % n];
        Vx[i] = (next.x - prev.x) / (h[(i-1+n)%n]/2 + h[i]/2);
        Vy[i] = (next.y - prev.y) / (h[(i-1+n)%n]/2 + h[i]/2);
      }
    }

    for (let iter = 0; iter < 20; iter++) {
      for (let i = 0; i < n; i++) {
        if (pts[i].manual) continue;
        const iPrev = (i - 1 + n) % n;
        const iNext = (i + 1) % n;
        const hp = h[iPrev], hn = h[i];
        const px = 3 * (hn * (pts[i].x - pts[iPrev].x) / hp + hp * (pts[iNext].x - pts[i].x) / hn);
        const py = 3 * (hn * (pts[i].y - pts[iPrev].y) / hp + hp * (pts[iNext].y - pts[i].y) / hn);
        
        Vx[i] = (px - hn * Vx[iPrev] - hp * Vx[iNext]) / (2 * (hp + hn));
        Vy[i] = (py - hn * Vy[iPrev] - hp * Vy[iNext]) / (2 * (hp + hn));
      }
    }

    for (let i = 0; i < n; i++) {
      if (!pts[i].manual) {
        pts[i].outT = { x: Vx[i] * h[i] / 3, y: Vy[i] * h[i] / 3 };
        pts[i].inT = { x: -Vx[i] * h[(i-1+n)%n] / 3, y: -Vy[i] * h[(i-1+n)%n] / 3 };
      }
    }
  }
}



function getCurvature(P0, M0, P1, M1, t) {
  let Vx, Vy, Ax, Ay;
  if (t === 0) {
    Vx = M0.x; Vy = M0.y;
    Ax = 6*(P1.x - P0.x) - 4*M0.x - 2*M1.x;
    Ay = 6*(P1.y - P0.y) - 4*M0.y - 2*M1.y;
  } else {
    Vx = M1.x; Vy = M1.y;
    Ax = -6*(P1.x - P0.x) + 2*M0.x + 4*M1.x;
    Ay = -6*(P1.y - P0.y) + 2*M0.y + 4*M1.y;
  }
  const v2 = Vx*Vx + Vy*Vy;
  if (v2 < 1e-5) return null;
  const cross = Vx*Ay - Vy*Ax;
  if (Math.abs(cross) < 1e-5) return null;
  const k = cross / Math.pow(v2, 1.5);
  let R = 1 / Math.abs(k);
  if (R > 500) R = 500; // Limit to 500mm
  const vMag = Math.sqrt(v2);
  const nx = -Vy / vMag;
  const ny = Vx / vMag;
  const cx = (t===0?P0.x:P1.x) + (1/k) * nx;
  const cy = (t===0?P0.y:P1.y) + (1/k) * ny;
  return { R, cx, cy };
}

function lineIntersectT(p1,d1,p2,d2){
  const denom=d1.x*d2.y-d1.y*d2.x;
  if(Math.abs(denom)<1e-10)return null;
  const t=((p2.x-p1.x)*d2.y-(p2.y-p1.y)*d2.x)/denom;
  return t;
}

function solveCatmullRomSpline(pts, closed, alpha=0.5) {
  const n = pts.length;
  if (n < 2) return;
  
  const getP = (i) => {
    if (closed) return pts[(i % n + n) % n];
    if (i < 0) return { x: 2*pts[0].x - pts[1].x, y: 2*pts[0].y - pts[1].y };
    if (i >= n) return { x: 2*pts[n-1].x - pts[n-2].x, y: 2*pts[n-1].y - pts[n-2].y };
    return pts[i];
  };
  
  const getD = (pA, pB) => Math.pow(Math.hypot(pB.x - pA.x, pB.y - pA.y), alpha) || 1e-5;
  
  for (let i = 0; i < n; i++) {
    if (pts[i].manual) continue;
    const p0 = getP(i - 1);
    const p1 = getP(i);
    const p2 = getP(i + 1);
    
    const d1 = getD(p0, p1);
    const d2 = getD(p1, p2);
    
    const T1x = (d1 * (p2.x - p1.x)/d2 + d2 * (p1.x - p0.x)/d1) / (d1 + d2);
    const T1y = (d1 * (p2.y - p1.y)/d2 + d2 * (p1.y - p0.y)/d1) / (d1 + d2);
    
    pts[i].outT = { x: T1x * d2 / 3, y: T1y * d2 / 3 };
    pts[i].inT = { x: -T1x * d1 / 3, y: -T1y * d1 / 3 };
  }
}

function solveGlobalBSpline(pts, closed) {
  const n = pts.length;
  if (n < 2) return;
  
  if (!closed) {
    const C_x = new Float64Array(n);
    const C_y = new Float64Array(n);
    C_x[0] = pts[0].x; C_y[0] = pts[0].y;
    C_x[n-1] = pts[n-1].x; C_y[n-1] = pts[n-1].y;
    
    if (n > 2) {
      const A = new Float64Array(n-2);
      const B = new Float64Array(n-2);
      const C = new Float64Array(n-2);
      const Dx = new Float64Array(n-2);
      const Dy = new Float64Array(n-2);
      
      for(let i=0; i<n-2; i++) {
        A[i] = 4; B[i] = 1; C[i] = 1;
        Dx[i] = 6 * pts[i+1].x;
        Dy[i] = 6 * pts[i+1].y;
      }
      Dx[0] -= pts[0].x;
      Dy[0] -= pts[0].y;
      Dx[n-3] -= pts[n-1].x;
      Dy[n-3] -= pts[n-1].y;
      
      const Ix = solveTridiagonal(A, B, C, Dx);
      const Iy = solveTridiagonal(A, B, C, Dy);
      
      for(let i=0; i<n-2; i++) {
        C_x[i+1] = Ix[i];
        C_y[i+1] = Iy[i];
      }
    }
    
    const getC = (i) => {
      if (i === -1) return { x: 2*C_x[0] - C_x[1], y: 2*C_y[0] - C_y[1] };
      if (i === n) return { x: 2*C_x[n-1] - C_x[n-2], y: 2*C_y[n-1] - C_y[n-2] };
      return { x: C_x[i], y: C_y[i] };
    };
    
    for(let i=0; i<n; i++) {
      if (!pts[i].manual) {
        const prev = getC(i-1), next = getC(i+1);
        pts[i].outT = { x: (next.x - prev.x)/6, y: (next.y - prev.y)/6 };
        pts[i].inT = { x: -(next.x - prev.x)/6, y: -(next.y - prev.y)/6 };
      }
    }
  } else {
    const C_x = new Float64Array(n);
    const C_y = new Float64Array(n);
    for(let i=0; i<n; i++) { C_x[i] = pts[i].x; C_y[i] = pts[i].y; }
    
    for(let iter=0; iter<15; iter++) {
      for(let i=0; i<n; i++) {
        const prevX = C_x[(i-1+n)%n], nextX = C_x[(i+1)%n];
        C_x[i] = (6*pts[i].x - prevX - nextX)/4;
        const prevY = C_y[(i-1+n)%n], nextY = C_y[(i+1)%n];
        C_y[i] = (6*pts[i].y - prevY - nextY)/4;
      }
    }
    
    for(let i=0; i<n; i++) {
      if (!pts[i].manual) {
        const prevX = C_x[(i-1+n)%n], nextX = C_x[(i+1)%n];
        const prevY = C_y[(i-1+n)%n], nextY = C_y[(i+1)%n];
        pts[i].outT = { x: (nextX - prevX)/6, y: (nextY - prevY)/6 };
        pts[i].inT = { x: -(nextX - prevX)/6, y: -(nextY - prevY)/6 };
      }
    }
  }
}


// --- geometry.js --- 
function getPolyline(s) {
  const closed = s.closed === true;
  if (s.type === 'line') return {pts: s.points.map(p=>({x:p.x, y:p.y})), closed};
  const rawPts = s.points;
  const rn = rawPts.length;
  if (rn < 2) return {pts: rawPts.map(p=>({x:p.x, y:p.y})), closed};
  const segs = closed ? rn : rn - 1;
  const pts = [];
  const steps = 20;
  for (let i = 0; i < segs; i++) {
    const p0 = rawPts[i], p1 = rawPts[(i + 1) % rn];
    const c0 = {x: p0.x + p0.outT.x, y: p0.y + p0.outT.y};
    const c1 = {x: p1.x + p1.inT.x, y: p1.y + p1.inT.y};
    for (let j = 0; j < steps; j++) {
      const t = j / steps;
      const u = 1 - t;
      const x = u*u*u*p0.x + 3*u*u*t*c0.x + 3*u*t*t*c1.x + t*t*t*p1.x;
      const y = u*u*u*p0.y + 3*u*u*t*c0.y + 3*u*t*t*c1.y + t*t*t*p1.y;
      pts.push({x, y});
    }
  }
  if (!closed) pts.push({x: rawPts[rn-1].x, y: rawPts[rn-1].y});
  return {pts, closed};
}

function buildOffsetPath(pts, closed, hw, sc) {
  const scaledPts = pts.map(p => ({ x: p.x * sc, y: p.y * sc }));
  const scaledHw = hw * sc;
  const d = svgOffsetPathD(scaledPts, closed, scaledHw);
  if (!d) return null;
  return new Path2D(d);
}

function getShapePath(s,sc){
  const{pts,closed}=getPolyline(s);
  if(pts.length<2)return null;
  return buildOffsetPath(pts,closed,(s.strokeWidth||strokeWidth)/2,sc);
}

function segDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(l2===0)return Math.hypot(p.x-a.x,p.y-a.y);
  const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}

function shapeCenter(s){
  if(!s.points.length)return{x:0,y:0};
  const xs=s.points.map(p=>p.x),ys=s.points.map(p=>p.y);
  return{x:(Math.min(...xs)+Math.max(...xs))/2,y:(Math.min(...ys)+Math.max(...ys))/2};
}

function isShapeClosed(s){
  return s.closed === true;
}

function getHandlePositions(s, ptIdx) {
  if(!s||s.type!=='spline')return{out:null,inn:null};
  const p = s.points[ptIdx];
  if (!p) return {out:null,inn:null};
  const closed = s.closed === true;
  const n = s.points.length;
  const outH = {x: p.x + p.outT.x, y: p.y + p.outT.y};
  const inH = {x: p.x + p.inT.x, y: p.y + p.inT.y};
  if (!closed) {
    if (ptIdx === 0) return { out: outH, inn: null };
    if (ptIdx === n - 1) return { out: null, inn: inH };
  }
  return {out: outH, inn: inH};
}

function offsetSeg(a,b,halfW){
  const{nx,ny}=segNormal(a,b);
  return{
    aL:{x:a.x+nx*halfW,y:a.y+ny*halfW},
    bL:{x:b.x+nx*halfW,y:b.y+ny*halfW},
    aR:{x:a.x-nx*halfW,y:a.y-ny*halfW},
    bR:{x:b.x-nx*halfW,y:b.y-ny*halfW}
  };
}

function miterJoin(bL_prev, dirPrev, bL_next, dirNext, halfW, maxMiter=4){
  const d1={x:dirPrev.x,y:dirPrev.y};
  const d2={x:dirNext.x,y:dirNext.y};
  const t=lineIntersectT(bL_prev,d1,bL_next,d2);
  if(t===null) return {x: (bL_prev.x + bL_next.x)/2, y: (bL_prev.y + bL_next.y)/2};
  const ip={x:bL_prev.x+t*d1.x,y:bL_prev.y+t*d1.y};
  const midX = (bL_prev.x + bL_next.x) / 2;
  const midY = (bL_prev.y + bL_next.y) / 2;
  const dx = ip.x - midX;
  const dy = ip.y - midY;
  const dist = Math.hypot(dx, dy);
  if (dist > maxMiter * halfW) {
    const scale = (maxMiter * halfW) / dist;
    return {
      x: midX + dx * scale,
      y: midY + dy * scale
    };
  }
  return ip;
}

function hitPoint(pos){
  // 픽셀 기준 반경: 줌 수준에 관계없이 항상 10px
  const thresh = 10 / (MM * viewScale);
  for(let i=shapes.length-1;i>=0;i--){
    const s=shapes[i];
    // Draw 모드에서는 copy 선택 불가
    if(currentMode==='draw' && s._isCopy) continue;
    const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
    const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
    for(let j=0;j<s.points.length;j++){
      if(Math.hypot(pLocal.x-s.points[j].x,pLocal.y-s.points[j].y)<thresh)
        return{shapeId:s.id,ptIdx:j};
    }
  }
  return null;
}

function isPointInPolygon(p, s) {
  const {pts} = getPolyline(s);
  const n = pts.length;
  if (n < 3) return false;
  let inside = false;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y))
        && (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 1e-10) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function hitSegment(pos){
  const thresh=Math.max(1.5,4/viewScale);
  for(let i=shapes.length-1;i>=0;i--){
    const s=shapes[i];
    // Draw 모드에서는 copy 선택 불가
    if(currentMode==='draw' && s._isCopy) continue;
    if(currentMode==='arrange' && s.groupId===GROUP1_ID && !s._isCopy && hasCopy(s.id)) continue;
    const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
    const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
    if (isShapeClosed(s)) {
      if (isPointInPolygon(pLocal, s)) return s;
    }
    const{pts}=getPolyline(s);
    for(let j=0;j<pts.length-1;j++){if(segDist(pLocal,pts[j],pts[j+1])<thresh)return s;}
    if(isShapeClosed(s)&&pts.length>2&&segDist(pLocal,pts[pts.length-1],pts[0])<thresh)return s;
  }
  return null;
}

function hitHandle(pos,s,ptIdx,side){
  if(!s||s.type!=='spline')return false;
  const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
  const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
  const{out:outH,inn:inH}=getHandlePositions(s,ptIdx);
  const h=side==='out'?outH:inH;
  if(!h)return false;
  // 픽셀 기준 반경 (점 10px보다 작아 점 우선순위 자연 보장)
  const thresh = 7 / (MM * viewScale);
  return Math.hypot(pLocal.x-h.x,pLocal.y-h.y)<thresh;
}

function hitGroupMarker(pos,g){
  const rot=g.rotation*Math.PI/180;
  const mx=circle.cx+Math.sin(rot)*circle.r;
  const my=circle.cy-Math.cos(rot)*circle.r;
  return Math.hypot(pos.x-mx,pos.y-my)<10;
}

function distToShape(pos,s){
  const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
  const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
  if (isShapeClosed(s) && isPointInPolygon(pLocal, s)) {
    return 0;
  }
  const{pts}=getPolyline(s);
  let md=Infinity;
  for(let j=0;j<pts.length-1;j++)md=Math.min(md,segDist(pLocal,pts[j],pts[j+1]));
  if(isShapeClosed(s)&&pts.length>2)md=Math.min(md,segDist(pLocal,pts[pts.length-1],pts[0]));
  return Math.max(0,md-(s.strokeWidth||strokeWidth)/2);
}

function snapToPoint(pos,excludeId=null){
  let best=null,bestD=SNAP_D;
  shapes.forEach(s=>{
    if(s.id===excludeId)return;
    const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
    s.points.forEach(p=>{
      const pWorld = g ? rotAround(p, circle.cx, circle.cy, g.rotation) : p;
      const d=Math.hypot(pos.x-pWorld.x,pos.y-pWorld.y);
      if(d<bestD){bestD=d;best=pWorld;}
    });
  });
  if(drawingShape&&drawingShape.points.length>=2){
    const p0=drawingShape.points[0];const d=Math.hypot(pos.x-p0.x,pos.y-p0.y);if(d<bestD){bestD=d;best=p0;}
  }
  return best;
}

function ensureCps(s){return;}

function getOrInitSeg(s,segIdx){
  ensureCps(s);
  if(!s.cps[segIdx]) s.cps[segIdx] = [null, null];
  return s.cps[segIdx];
}

function splitBezier(p0, cp0, cp1, p1, t) {
  const u = 1 - t;
  const q0 = { x: u*p0.x + t*cp0.x, y: u*p0.y + t*cp0.y };
  const q1 = { x: u*cp0.x + t*cp1.x, y: u*cp0.y + t*cp1.y };
  const q2 = { x: u*cp1.x + t*p1.x, y: u*cp1.y + t*p1.y };
  const r0 = { x: u*q0.x + t*q1.x, y: u*q0.y + t*q1.y };
  const r1 = { x: u*q1.x + t*q2.x, y: u*q1.y + t*q2.y };
  const pt = { x: u*r0.x + t*r1.x, y: u*r0.y + t*r1.y };
  return { left: [p0, q0, r0, pt], right: [pt, r1, q2, p1] };
}

function getTransformHandles(obj) {
  const {cx, cy, w, h, rotation} = obj;
  const rad = rotation * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const rot = (x, y) => ({ x: cx + x*cos - y*sin, y: cy + x*sin + y*cos });
  return {
    tl: rot(-w/2, -h/2), tr: rot(w/2, -h/2), br: rot(w/2, h/2), bl: rot(-w/2, h/2),
    t: rot(0, -h/2), r: rot(w/2, 0), b: rot(0, h/2), l: rot(-w/2, 0),
    rotH: rot(0, -h/2 - 10)
  };
}

function hitTestCanvasObj(obj, pos) {
  const rad = -obj.rotation * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const dx = pos.x - obj.cx, dy = pos.y - obj.cy;
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;
  return Math.abs(lx) <= obj.w/2 && Math.abs(ly) <= obj.h/2;
}

function getShapesBounds() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  shapes.forEach(s => {
    const g = s.groupId ? groups.find(x => x.id === s.groupId) : null;
    const {pts} = getPolyline(s);
    pts.forEach(p => {
      const w = g ? rotAround(p, circle.cx, circle.cy, g.rotation) : p;
      minX = Math.min(minX, w.x);
      minY = Math.min(minY, w.y);
      maxX = Math.max(maxX, w.x);
      maxY = Math.max(maxY, w.y);
    });
  });
  if (minX === Infinity) return null;
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY };
}

function getCanvasModeTarget(pos) {
  const hitR = Math.max(4, 8/viewScale);
  // 1. Check active object handles
  if (canvSelType === 'image') {
    const activeObj = images.find(x => x.id === canvSelId);
    if (activeObj) {
      const handles = getTransformHandles(activeObj);
      for (let k in handles) {
        if (Math.hypot(pos.x - handles[k].x, pos.y - handles[k].y) < hitR) {
          return { type: canvSelType, id: canvSelId, handle: k };
        }
      }
    }
  } else if (canvSelType === 'shapes' && shapesTransform) {
    const handles = getTransformHandles(shapesTransform);
    for (let k in handles) {
      if (Math.hypot(pos.x - handles[k].x, pos.y - handles[k].y) < hitR) {
        return { type: 'shapes', id: null, handle: k };
      }
    }
  }
  // 1.5. Check circle center or border
  const distToCircleCenter = Math.hypot(pos.x - circle.cx, pos.y - circle.cy);
  if (distToCircleCenter < Math.max(6, 12/viewScale) || Math.abs(distToCircleCenter - circle.r) < Math.max(3, 6/viewScale)) {
    return { type: 'circle', id: null, handle: 'center' };
  }
  // 1.8. Check shapes (vector lines)
  const hitShape = hitSegment(pos);
  if (hitShape) {
    const bounds = getShapesBounds();
    if (bounds) {
      shapesTransform.cx = bounds.x + bounds.w/2;
      shapesTransform.cy = bounds.y + bounds.h/2;
      shapesTransform.w = bounds.w;
      shapesTransform.h = bounds.h;
      shapesTransform.rotation = 0;
      return { type: 'shapes', id: null, handle: 'center' };
    }
  }
  // 2. Check images (front to back)
  for (let i = images.length - 1; i >= 0; i--) {
    if (hitTestCanvasObj(images[i], pos)) {
      return { type: 'image', id: images[i].id, handle: 'center' };
    }
  }
  return null;
}

function updateHermiteTangents(s) {
  const pts = s.points;
  const n = pts.length;
  if (n < 2) return;
  
  if (typeof currentSplineAlgo !== 'undefined') {
    if (currentSplineAlgo === 'natural') solveNaturalCubicSpline(pts, s.closed);
    else if (currentSplineAlgo === 'catmull') solveCatmullRomSpline(pts, s.closed, 0.5);
    else if (currentSplineAlgo === 'bspline') solveGlobalBSpline(pts, s.closed);
    else solveNaturalCubicSpline(pts, s.closed);
  } else {
    solveNaturalCubicSpline(pts, s.closed);
  }
}

// --- render.js --- 
function render(){
  const W=mainCanvas.width,H=mainCanvas.height,sc=MM*viewScale;
  // 뷰포트 전체 클리어
  bgCtx.clearRect(0,0,W,H);
  ctx.clearRect(0,0,W,H);
  // pan/zoom 트랜스폼 적용 (캔버스는 뷰포트 고정 크기, 오프셋으로 이동)
  bgCtx.save();
  bgCtx.translate(viewOffX,viewOffY);
  ctx.save();
  ctx.translate(viewOffX,viewOffY);
  // 용지 영역에만 배경색 채우기
  bgCtx.fillStyle=document.getElementById('cv-bg').value;
  bgCtx.fillRect(0,0,canvasW*sc,canvasH*sc);
  if(bgImage)bgCtx.drawImage(bgImage,0,0,canvasW*sc,canvasH*sc);
  renderCanvasMode(sc);
  shapes.forEach(s=>renderShape(s,sc));
  if(drawing&&drawingShape)renderShape(drawingShape,sc,true);
  renderCircle(sc);
  if(currentMode==='arrange'||currentMode==='label')renderGroupMarkers(sc);
  if(currentMode==='label')renderLabels(sc);
  if(currentMode==='draw'&&drawTool==='select'&&selShapeId!==null&&selPtIdx!==null)renderBezierHandles(sc);
  if(typeof updateImageSizeUI === 'function') updateImageSizeUI();
  // 트랜스폼 복구
  bgCtx.restore();
  ctx.restore();
}

function renderShape(s,sc,isPreview=false,customCtx=null){
  const drawCtx=customCtx||ctx;
  const g=s.groupId?groups.find(x=>x.id===s.groupId):null;
  const color=gColor(s);
  const isGhost=(s.groupId===GROUP1_ID&&!s._isCopy&&hasCopy(s.id));
  const isCopyInDrawMode=(currentMode==='draw'&&s._isCopy);
  // draw 모드에서 isGhost는 무시 (원본을 진하게 보이게)
  const applyGhost = isGhost && currentMode !== 'draw';
  const shapeOpacity = (s.opacity !== undefined ? s.opacity : 1.0);
  drawCtx.save();
  if(g&&g.rotation!==0){
    drawCtx.translate(circle.cx*sc,circle.cy*sc);
    drawCtx.rotate(g.rotation*Math.PI/180);
    drawCtx.translate(-circle.cx*sc,-circle.cy*sc);
  }
  const baseAlpha = isPreview?0.55 : applyGhost?0.15 : isCopyInDrawMode?0.22 : 1.0;
  drawCtx.globalAlpha = baseAlpha * shapeOpacity;
  
  const{pts,closed}=getPolyline(s);
  if(pts.length>=2){
    drawCtx.beginPath();
    drawCtx.moveTo(pts[0].x*sc,pts[0].y*sc);
    pts.slice(1).forEach(p=>drawCtx.lineTo(p.x*sc,p.y*sc));
    drawCtx.lineJoin = 'miter';
    drawCtx.lineCap = 'round';
    if(closed){
      drawCtx.closePath();
      drawCtx.fillStyle=color;
      drawCtx.fill();
      drawCtx.strokeStyle=color;
      drawCtx.lineWidth=(s.strokeWidth||strokeWidth)*sc;
      drawCtx.stroke();
    } else {
      drawCtx.strokeStyle=color;
      drawCtx.lineWidth=(s.strokeWidth||strokeWidth)*sc;
      drawCtx.stroke();
    }
  }

  // Arrange highlight
  if(currentMode==='arrange'&&s.id===arrSelShapeId&&pts.length>=2&&!customCtx){
    drawCtx.save();
    drawCtx.globalAlpha=0.3;
    drawCtx.beginPath();
    drawCtx.moveTo(pts[0].x*sc,pts[0].y*sc);
    pts.slice(1).forEach(p=>drawCtx.lineTo(p.x*sc,p.y*sc));
    if(closed){
      drawCtx.closePath();
      drawCtx.fillStyle='#fff';
      drawCtx.fill();
    }
    drawCtx.restore();
    
    drawCtx.globalAlpha=0.9;drawCtx.strokeStyle='#fff';drawCtx.lineWidth=1.5;
    drawCtx.beginPath();drawCtx.moveTo(pts[0].x*sc,pts[0].y*sc);
    pts.slice(1).forEach(p=>drawCtx.lineTo(p.x*sc,p.y*sc));
    if(closed)drawCtx.closePath();
    drawCtx.stroke();
  }
  // Draw mode vertex/edge drawing
  if(currentMode==='draw'&&s.id===selShapeId&&!customCtx){
    if(pts.length>=2){
      drawCtx.strokeStyle='#4488ffaa';drawCtx.lineWidth=1;
      drawCtx.beginPath();drawCtx.moveTo(pts[0].x*sc,pts[0].y*sc);
      pts.slice(1).forEach(p=>drawCtx.lineTo(p.x*sc,p.y*sc));
      if(closed)drawCtx.closePath();
      drawCtx.stroke();
    }
    s.points.forEach((p,idx)=>{
      const isSel=idx===selPtIdx;
      drawCtx.beginPath();drawCtx.arc(p.x*sc,p.y*sc,isSel?6:4,0,Math.PI*2);
      drawCtx.fillStyle=isSel?'#ff007f':'#4488ff';drawCtx.fill();
      drawCtx.strokeStyle='#fff';drawCtx.lineWidth=1;drawCtx.stroke();
    });
  }
  drawCtx.restore();
}

function renderCircle(sc){
  const cx=circle.cx*sc,cy=circle.cy*sc,r=circle.r*sc;
  ctx.save();
  ctx.strokeStyle='#4488ff77';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#4488ffcc';ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);ctx.fill();
  if(currentMode==='canvas'){
    ctx.strokeStyle='#4488ff44';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx-r,cy);ctx.lineTo(cx+r,cy);ctx.stroke();
    ctx.fillStyle='#4488ffbb';ctx.font='11px sans-serif';
    ctx.fillText(`⌀${(circle.r*2).toFixed(1)}mm`,cx+r+5,cy+4);
  }
  ctx.restore();
}

function renderCanvasMode(sc) {
  images.forEach(img => {
     ctx.save();
     ctx.globalAlpha = (img.opacity !== undefined ? img.opacity : 1.0);
     ctx.translate(img.cx*sc, img.cy*sc);
     ctx.rotate(img.rotation * Math.PI / 180);
     ctx.drawImage(img.img, -img.w/2*sc, -img.h/2*sc, img.w*sc, img.h*sc);
     ctx.restore();
  });
  if (paperGuide.visible) {
    ctx.save();
    ctx.translate(paperGuide.cx*sc, paperGuide.cy*sc);
    ctx.rotate(paperGuide.rotation * Math.PI / 180);
    ctx.strokeStyle = canvSelType==='paper'?'#ff00ff':'#00ffff';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 5]);
    ctx.strokeRect(-paperGuide.w/2*sc, -paperGuide.h/2*sc, paperGuide.w*sc, paperGuide.h*sc);
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
    ctx.moveTo(0, -5); ctx.lineTo(0, 5);
    ctx.stroke();
    ctx.fillStyle = canvSelType==='paper'?'#ff00ff':'#00ffff';
    ctx.font = '12px sans-serif';
    ctx.fillText('Paper', -paperGuide.w/2*sc + 2, -paperGuide.h/2*sc + 14);
    ctx.restore();
  }
  if (currentMode === 'canvas') {
     const activeObj = canvSelType === 'paper' ? paperGuide : (canvSelType === 'image' ? images.find(x => x.id === canvSelId) : (canvSelType === 'shapes' ? shapesTransform : null));
     if (activeObj) {
        const rad = activeObj.rotation * Math.PI / 180;
        const cos = Math.cos(rad), sin = Math.sin(rad);
        const rot = (x, y) => ({ x: (activeObj.cx + x*cos - y*sin)*sc, y: (activeObj.cy + x*sin + y*cos)*sc });
        const w2 = activeObj.w/2, h2 = activeObj.h/2;
        const handles = {
          tl: rot(-w2, -h2), tr: rot(w2, -h2), br: rot(w2, h2), bl: rot(-w2, h2),
          t: rot(0, -h2), r: rot(w2, 0), b: rot(0, h2), l: rot(-w2, 0),
          rotH: rot(0, -h2 - 10)
        };
        ctx.strokeStyle = canvSelType==='paper'?'#ff00ff':'#00ffff';
        ctx.fillStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.setLineDash([]);
        const r = 4;
        ctx.beginPath();
        ctx.moveTo(handles.tl.x, handles.tl.y);
        ctx.lineTo(handles.tr.x, handles.tr.y);
        ctx.lineTo(handles.br.x, handles.br.y);
        ctx.lineTo(handles.bl.x, handles.bl.y);
        ctx.closePath();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(handles.t.x, handles.t.y);
        ctx.lineTo(handles.rotH.x, handles.rotH.y);
        ctx.stroke();
        for(let k in handles) {
           ctx.beginPath();
           if(k === 'rotH') ctx.arc(handles[k].x, handles[k].y, r, 0, Math.PI*2);
           else ctx.rect(handles[k].x - r, handles[k].y - r, r*2, r*2);
           ctx.fill(); ctx.stroke();
        }
     }
  }
}

function renderGroupMarkers(sc){
  groups.forEach(g=>{
    // Marker: radially tall (6mm tall, 1mm wide at circle edge)
    const mRadHalf=3*sc;   // 6mm total radial height 편측3mm
    const mTangHalf=0.5*sc; // 1mm tangential width 편측0.5mm
    ctx.save();
    ctx.translate(circle.cx*sc,circle.cy*sc);
    ctx.rotate(g.rotation*Math.PI/180);
    const edgeY=-(circle.r*sc);
    const isSel=arrSelShapeId&&shapes.find(s=>s.id===arrSelShapeId)?.groupId===g.id;
    ctx.fillStyle=g.color+(isSel?'ff':'bb');
    ctx.strokeStyle=isSel?'#fff':g.color;
    ctx.lineWidth=isSel?2:1;
    ctx.beginPath();
    ctx.rect(-mTangHalf,edgeY-mRadHalf,mTangHalf*2,mRadHalf*2);
    ctx.fill();ctx.stroke();
    // Label to the right
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(9,3.5*sc)}px sans-serif`;
    ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(g.label,mTangHalf+4,edgeY);
    ctx.restore();
  });
}

function renderLabels(sc){
  const fs=parseFloat(document.getElementById('label-size').value)||4;
  shapes.forEach(s=>{
    if(!s.groupId)return;
    const g=groups.find(x=>x.id===s.groupId);if(!g)return;
    const lbl=labels[s.id]||{ox:4,oy:-4};
    const ctr=shapeCenter(s);
    ctx.save();
    ctx.translate(circle.cx*sc,circle.cy*sc);
    ctx.rotate(g.rotation*Math.PI/180);
    ctx.translate(-circle.cx*sc,-circle.cy*sc);
    const lx=(ctr.x+lbl.ox)*sc,ly=(ctr.y+lbl.oy)*sc;
    ctx.font=`bold ${fs*sc}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='#000a';ctx.lineWidth=3;ctx.strokeText(g.label,lx,ly);
    ctx.fillStyle=g.color;ctx.fillText(g.label,lx,ly);
    ctx.restore();
  });
}

function renderBezierHandles(sc){
  const s=shapes.find(x=>x.id===selShapeId);
  if(!s||s.type!=='spline'||selPtIdx===null)return;
  const p=s.points[selPtIdx];
  const{out:outH,inn:inH}=getHandlePositions(s,selPtIdx);
  ctx.save();
  ctx.setLineDash([2,2]);ctx.lineWidth=1;
  if(inH){
    ctx.strokeStyle='#ff9900aa';
    ctx.beginPath();ctx.moveTo(p.x*sc,p.y*sc);ctx.lineTo(inH.x*sc,inH.y*sc);ctx.stroke();
    const isDragging=dragState?.type==='cpIn';
    ctx.beginPath();ctx.arc(inH.x*sc,inH.y*sc,isDragging?7:5,0,Math.PI*2);
    ctx.fillStyle='#ff9900';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }
  if(outH){
    ctx.strokeStyle='#00dd88aa';
    ctx.beginPath();ctx.moveTo(p.x*sc,p.y*sc);ctx.lineTo(outH.x*sc,outH.y*sc);ctx.stroke();
    const isDragging=dragState?.type==='cpOut';
    ctx.beginPath();ctx.arc(outH.x*sc,outH.y*sc,isDragging?7:5,0,Math.PI*2);
    ctx.fillStyle='#00dd88';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.setLineDash([]);
  // Labels
  ctx.fillStyle='#fff';ctx.font='10px sans-serif';
  if(inH) ctx.fillText('in',inH.x*sc+7,inH.y*sc-7);
  if(outH)ctx.fillText('out',outH.x*sc+7,outH.y*sc-7);
  if (currentCurvature) {
    ctx.strokeStyle = '#ffff0088';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(currentCurvature.cx * sc, currentCurvature.cy * sc, currentCurvature.R * sc, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(currentCurvature.cx * sc, currentCurvature.cy * sc, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.setLineDash([]);
  }
  ctx.restore();
}

// --- tools.js --- 
function mCanvasDown(pos,e){
  const target = getCanvasModeTarget(pos);
  if (target) {
    canvSelType = target.type;
    canvSelId = target.id;
    canvSelHandle = target.handle;
    canvDragStartPos = { x: pos.x, y: pos.y };
    const obj = canvSelType === 'paper' ? paperGuide : (canvSelType === 'circle' ? circle : (canvSelType === 'shapes' ? shapesTransform : images.find(x => x.id === canvSelId)));
    if(obj) {
      canvDragStartObj = { cx: obj.cx, cy: obj.cy, w: obj.w, h: obj.h, rotation: obj.rotation };
    }
    if (canvSelType === 'shapes') {
      transformStartShapes = JSON.parse(JSON.stringify(shapes));
    }
  } else {
    canvSelType = null;
    canvSelId = null;
    canvSelHandle = null;
  }
  render();
}

function mCanvasMove(pos,e){
  if (!canvSelHandle || !_mdMm) return;
  const obj = canvSelType === 'paper' ? paperGuide : (canvSelType === 'circle' ? circle : (canvSelType === 'shapes' ? shapesTransform : images.find(x => x.id === canvSelId)));
  if (!obj) return;
  const dx = pos.x - canvDragStartPos.x;
  const dy = pos.y - canvDragStartPos.y;
  if (canvSelHandle === 'center') {
    let nx = canvDragStartObj.cx + dx;
    let ny = canvDragStartObj.cy + dy;
    if (e.shiftKey) {
      if (Math.abs(dx) > Math.abs(dy)) ny = canvDragStartObj.cy;
      else nx = canvDragStartObj.cx;
    }
    obj.cx = nx;
    obj.cy = ny;
  } else if (canvSelHandle === 'rotH') {
    const cx = canvDragStartObj.cx, cy = canvDragStartObj.cy;
    let ang = Math.atan2(pos.y - cy, pos.x - cx) * 180 / Math.PI + 90;
    if (e.shiftKey) ang = Math.round(ang / 45) * 45;
    obj.rotation = ang;
  } else {
    const rad = canvDragStartObj.rotation * Math.PI / 180;
    const cos = Math.cos(rad), sin = Math.sin(rad);
    const locDx = dx * cos + dy * sin;
    const locDy = -dx * sin + dy * cos;
    let scaleX = 1, scaleY = 1;
    if (canvSelHandle === 'tl') { scaleX = (canvDragStartObj.w - locDx*2) / canvDragStartObj.w; scaleY = (canvDragStartObj.h - locDy*2) / canvDragStartObj.h; }
    else if (canvSelHandle === 'tr') { scaleX = (canvDragStartObj.w + locDx*2) / canvDragStartObj.w; scaleY = (canvDragStartObj.h - locDy*2) / canvDragStartObj.h; }
    else if (canvSelHandle === 'br') { scaleX = (canvDragStartObj.w + locDx*2) / canvDragStartObj.w; scaleY = (canvDragStartObj.h + locDy*2) / canvDragStartObj.h; }
    else if (canvSelHandle === 'bl') { scaleX = (canvDragStartObj.w - locDx*2) / canvDragStartObj.w; scaleY = (canvDragStartObj.h + locDy*2) / canvDragStartObj.h; }
    if (e.shiftKey) { const maxS = Math.max(scaleX, scaleY); scaleX = maxS; scaleY = maxS; }
    obj.w = Math.max(10, canvDragStartObj.w * scaleX);
    obj.h = Math.max(10, canvDragStartObj.h * scaleY);
    if (canvSelType === 'paper' && document.getElementById('pg-size').value === 'Custom') {
      document.getElementById('cv-w').value = Math.round(obj.w);
      document.getElementById('cv-h').value = Math.round(obj.h);
    }
  }

  // shapes 실시간 변환 적용
  if (canvSelType === 'shapes' && transformStartShapes) {
    const startObj = canvDragStartObj;
    const currentObj = shapesTransform;
    const sx = startObj.w > 0 ? (currentObj.w / startObj.w) : 1;
    const sy = startObj.h > 0 ? (currentObj.h / startObj.h) : 1;
    const dRot = currentObj.rotation - startObj.rotation;
    const dxVal = currentObj.cx - startObj.cx;
    const dyVal = currentObj.cy - startObj.cy;

    shapes = JSON.parse(JSON.stringify(transformStartShapes));
    shapes.forEach(shape => {
      shape.points.forEach(p => {
        let px1 = startObj.cx + (p.x - startObj.cx) * sx;
        let py1 = startObj.cy + (p.y - startObj.cy) * sy;
        let pRot = rotAround({ x: px1, y: py1 }, startObj.cx, startObj.cy, dRot);
        p.x = pRot.x + dxVal;
        p.y = pRot.y + dyVal;

        if (p.inT) {
          let vx1 = p.inT.x * sx;
          let vy1 = p.inT.y * sy;
          let vRot = rotAround({ x: vx1, y: vy1 }, 0, 0, dRot);
          p.inT.x = vRot.x;
          p.inT.y = vRot.y;
        }
        if (p.outT) {
          let vx1 = p.outT.x * sx;
          let vy1 = p.outT.y * sy;
          let vRot = rotAround({ x: vx1, y: vy1 }, 0, 0, dRot);
          p.outT.x = vRot.x;
          p.outT.y = vRot.y;
        }
      });
    });
  }

  render();
}

function mCanvasUp(pos){
  canvSelHandle = null;
  if (canvSelType === 'shapes') {
    if (transformStartShapes) {
      saveSnapshot();
      triggerAutosave();
      transformStartShapes = null;
    }
    const bounds = getShapesBounds();
    if (bounds) {
      shapesTransform.cx = bounds.x + bounds.w/2;
      shapesTransform.cy = bounds.y + bounds.h/2;
      shapesTransform.w = bounds.w;
      shapesTransform.h = bounds.h;
      shapesTransform.rotation = 0;
    }
  }
}

function mDrawDown(pos,e){
  if(drawTool==='select'){
    const s=selShapeId!==null?shapes.find(x=>x.id===selShapeId):null;

    // 1. 먼저 클릭 위치에 포인트가 있는지 확인
    const hp=hitPoint(pos);

    // 2. 클릭된 점이 현재 선택된 바로 그 점일 때만 핸들을 우선 체크
    //    (이미 선택된 점 위에서 핸들을 드래그해야 하므로)
    if(hp && s && s.type==='spline' && selPtIdx!==null
       && hp.shapeId===selShapeId && hp.ptIdx===selPtIdx){
      const pd=s.points[selPtIdx];
      if(hitHandle(pos,s,selPtIdx,'out')){
        const outH={x:pd.x+pd.outT.x,y:pd.y+pd.outT.y};
        dragState={type:'cpOut',shapeId:s.id,ptIdx:selPtIdx,grabX:outH.x-pos.x,grabY:outH.y-pos.y};
        return;
      }
      if(hitHandle(pos,s,selPtIdx,'in')){
        const inH={x:pd.x+pd.inT.x,y:pd.y+pd.inT.y};
        dragState={type:'cpIn',shapeId:s.id,ptIdx:selPtIdx,grabX:inH.x-pos.x,grabY:inH.y-pos.y};
        return;
      }
    }

    // 3. 포인트 클릭 처리 (어떤 핸들보다 우선)
    if(hp){
      selShapeId=hp.shapeId;selPtIdx=hp.ptIdx;selHandle=null;dragState=null;
      updatePropsPanel();render();return;
    }

    // 4. 포인트가 없을 때만 핸들 체크 (선택된 점의 핸들 드래그 시작)
    if(s&&s.type==='spline'&&selPtIdx!==null){
      const pd=s.points[selPtIdx];
      if(hitHandle(pos,s,selPtIdx,'out')){
        const outH={x:pd.x+pd.outT.x,y:pd.y+pd.outT.y};
        dragState={type:'cpOut',shapeId:s.id,ptIdx:selPtIdx,grabX:outH.x-pos.x,grabY:outH.y-pos.y};
        return;
      }
      if(hitHandle(pos,s,selPtIdx,'in')){
        const inH={x:pd.x+pd.inT.x,y:pd.y+pd.inT.y};
        dragState={type:'cpIn',shapeId:s.id,ptIdx:selPtIdx,grabX:inH.x-pos.x,grabY:inH.y-pos.y};
        return;
      }
    }

    // 5. 도형(선분) 클릭
    const hs=hitSegment(pos);
    if(hs){
      selShapeId=hs.id;selPtIdx=null;selHandle=null;
      dragState={type:'shape',shapeId:hs.id,startPos:{...pos},origPts:hs.points.map(p=>({...p})),origCps:hs.cps?JSON.parse(JSON.stringify(hs.cps)):null};
      updatePropsPanel();render();return;
    }
    selShapeId=null;selPtIdx=null;selHandle=null;dragState=null;
    render();return;
  }
  // Drawing
  const snapOff=e.ctrlKey;
  let sx=pos.x,sy=pos.y;
  if(!snapOff){const sn=snapToPoint(pos,drawing?drawingShape?.id:null);if(sn){sx=sn.x;sy=sn.y;}}
  if(!drawing){
    drawingShape={id:nextShapeId++,type:drawTool,points:[{x:sx,y:sy,inT:{x:0,y:0},outT:{x:0,y:0},mode:'smooth'}],closed:false,strokeWidth,groupId:GROUP1_ID};
    drawing=true;
  } else {
    const p0=drawingShape.points[0];
    if(drawingShape.points.length>=2&&Math.hypot(sx-p0.x,sy-p0.y)<SNAP_D){
      drawingShape.closed=true;finishDrawing();return;
    }
    drawingShape.points.push({x:sx,y:sy,inT:{x:0,y:0},outT:{x:0,y:0},mode:'smooth'});
      if (drawingShape.type==='spline') updateHermiteTangents(drawingShape);
      // 그리기 중에는 원본 복사본 동기화 불필요 (혁재 그리는 도형은 아직 shapes에 없음)
  }
  render();
}

function mDrawMove(pos,e){
  const snapOff=e.ctrlKey;
  if(drawTool==='select'&&!dragState){
    hoverPtRef=hitPoint(pos);
    mainCanvas.style.cursor=(hoverPtRef||hitSegment(pos))?'pointer':'default';
  }
  // Bezier handle drag
  if(dragState?.type==='cpOut'){
    const s=shapes.find(x=>x.id===dragState.shapeId);if(s){
      const p = s.points[dragState.ptIdx];
      p.manual = true;
      // grab 오프셋 적용: 클릭 지점에서 핸들 중심까지의 차이를 보정
      const tx = pos.x + (dragState.grabX||0);
      const ty = pos.y + (dragState.grabY||0);
      p.outT = {x: tx - p.x, y: ty - p.y};
      if (p.mode === 'sym') p.inT = {x: -p.outT.x, y: -p.outT.y};
      else if (p.mode === 'smooth') {
        const lenIn = Math.hypot(p.inT.x, p.inT.y);
        const lenOut = Math.hypot(p.outT.x, p.outT.y) || 1e-5;
        p.inT = {x: -p.outT.x * lenIn / lenOut, y: -p.outT.y * lenIn / lenOut};
      }
      const closed = isShapeClosed(s);
      const n = s.points.length;
      let nextIdx = (dragState.ptIdx + 1) % n;
      if (!closed && dragState.ptIdx === n - 1) { currentCurvature = null; }
      else {
        const p1 = s.points[nextIdx];
        currentCurvature = getCurvature(p, p.outT, p1, {x: -p1.inT.x, y: -p1.inT.y}, 0);
      }
      syncCopies(s);
    }
    render();return;
  }
  if(dragState?.type==='cpIn'){
    const s=shapes.find(x=>x.id===dragState.shapeId);if(s){
      const p = s.points[dragState.ptIdx];
      p.manual = true;
      // grab 오프셋 적용
      const tx = pos.x + (dragState.grabX||0);
      const ty = pos.y + (dragState.grabY||0);
      p.inT = {x: tx - p.x, y: ty - p.y};
      if (p.mode === 'sym') p.outT = {x: -p.inT.x, y: -p.inT.y};
      else if (p.mode === 'smooth') {
        const lenOut = Math.hypot(p.outT.x, p.outT.y);
        const lenIn = Math.hypot(p.inT.x, p.inT.y) || 1e-5;
        p.outT = {x: -p.inT.x * lenOut / lenIn, y: -p.inT.y * lenOut / lenIn};
      }
      const closed = isShapeClosed(s);
      const n = s.points.length;
      let prevIdx = (dragState.ptIdx - 1 + n) % n;
      if (!closed && dragState.ptIdx === 0) { currentCurvature = null; }
      else {
        const p0 = s.points[prevIdx];
        currentCurvature = getCurvature(p0, p0.outT, p, {x: -p.inT.x, y: -p.inT.y}, 1);
      }
      syncCopies(s);
    }
    render();return;
  }
  // Point drag (activated once hasDragged)
  if(dragState?.type==='pt'&&_hasDragged){
    const s=shapes.find(x=>x.id===dragState.shapeId);
    if(s){
      const g = s.groupId ? groups.find(x=>x.id===s.groupId) : null;
      const pLocal = g ? rotAround(pos, circle.cx, circle.cy, -g.rotation) : pos;
      s.points[dragState.ptIdx].x=pLocal.x;
      s.points[dragState.ptIdx].y=pLocal.y;
      if(s.type==='spline') updateHermiteTangents(s);
      syncCopies(s);
    }
    render();return;
  }
  // Shape drag
  if(dragState?.type==='shape'&&_hasDragged){
    const s=shapes.find(x=>x.id===dragState.shapeId);
    if(s){
      const dx=pos.x-dragState.startPos.x,dy=pos.y-dragState.startPos.y;
      s.points.forEach((p,i)=>{p.x=dragState.origPts[i].x+dx;p.y=dragState.origPts[i].y+dy;});
      if(s.cps&&dragState.origCps){s.cps.forEach((seg,i)=>{if(seg&&dragState.origCps[i]){seg[0]={x:dragState.origCps[i][0].x+dx,y:dragState.origCps[i][0].y+dy};seg[1]={x:dragState.origCps[i][1].x+dx,y:dragState.origCps[i][1].y+dy};}});}
      syncCopies(s);
    }
    render();return;
  }
  // Point drag (activated on mousedown, starts on first move)
  if(_mdMm && selShapeId!==null&&selPtIdx!==null&&drawTool==='select'&&_hasDragged&&!dragState){
    const s=shapes.find(x=>x.id===selShapeId);
    if(s){
      dragState={type:'pt',shapeId:s.id,ptIdx:selPtIdx,startPos:{...pos},origPts:s.points.map(p=>({...p}))};
    }
  }
  if(!drawing){render();return;}
  render();
  let px=pos.x,py=pos.y;
  if(!snapOff){const sn=snapToPoint(pos,drawingShape.id);if(sn){px=sn.x;py=sn.y;}}
  const p0=drawingShape.points[0];
  const willClose=drawingShape.points.length>=2&&Math.hypot(px-p0.x,py-p0.y)<SNAP_D;
  const sc=MM*viewScale,last=drawingShape.points[drawingShape.points.length-1];
  ctx.save();
  ctx.strokeStyle=willClose?'#00ff88aa':'#fff5';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(last.x*sc,last.y*sc);ctx.lineTo(willClose?p0.x*sc:px*sc,willClose?p0.y*sc:py*sc);ctx.stroke();ctx.setLineDash([]);
  if(willClose){ctx.strokeStyle='#00ff88';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p0.x*sc,p0.y*sc,8,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

function mDrawUp(pos,e){
  // 드래그가 있었으면 스냅셛 저장
  if(dragState && _hasDragged) saveSnapshot();
  dragState=null;render();
}

function mArrDown(pos,e){
  // Group marker
  for(const g of groups){
    if(g.id===GROUP1_ID)continue;
    if(hitGroupMarker(pos,g)){
      arrDragState={type:'marker',groupId:g.id,startAng:Math.atan2(pos.y-circle.cy,pos.x-circle.cx),startRot:g.rotation};
      render();return;
    }
  }
  // ANY shape in ANY group
  const hs=hitSegment(pos);
  if(hs){
    arrSelShapeId=hs.id;
    // Follow to original if copy
    const origId=hs._isCopy?hs._origId:hs.id;
    arrDragState={type:'shape',shapeId:hs.id,origId,origGroupId:hs.groupId,startAng:Math.atan2(pos.y-circle.cy,pos.x-circle.cx),newGroupId:null};
    refreshGroupList();render();return;
  }
  arrSelShapeId=null;arrDragState=null;refreshGroupList();render();
}

function mArrMove(pos,e){
  if(!arrDragState||!_hasDragged)return;
  const ang=Math.atan2(pos.y-circle.cy,pos.x-circle.cx);
  if(arrDragState.type==='marker'){
    if(arrDragState.groupId === GROUP1_ID) return;
    const g=groups.find(x=>x.id===arrDragState.groupId);
    if(g)g.rotation=arrDragState.startRot+(ang-arrDragState.startAng)*180/Math.PI;
    render();return;
  }
  if(arrDragState.type==='shape'){
    const origShape=shapes.find(x=>x.id===arrDragState.origId&&!x._isCopy)||shapes.find(x=>x.id===arrDragState.origId);
    if(!origShape)return;

    // 마우스의 12시 기준 각도 (0~360): sin(ang)*r = x방향, -cos(ang)*r = y방향
    const mouseAngle360 = (Math.atan2(pos.x - circle.cx, -(pos.y - circle.cy)) * 180 / Math.PI + 360) % 360;

    if(e.ctrlKey){
      if(!arrDragState.newGroupId){
        const ng={id:nextGroupId++,label:groups.length+1,color:GCOLORS[groups.length%GCOLORS.length],rotation:mouseAngle360,locked:false};
        groups.push(ng);arrDragState.newGroupId=ng.id;refreshGroupList();
        // 원래 그룹이 GROUP1이 아니면 이동 (원본 그룹에서 제거)
        if(arrDragState.origGroupId !== GROUP1_ID){
          removeCopy(origShape.id, arrDragState.origGroupId);
          arrDragState.origGroupId = GROUP1_ID;
        }
      }
      const ng=groups.find(x=>x.id===arrDragState.newGroupId);
      // 새 그룹 rotation을 마우스 각도로 실시간 업데이트
      if(ng) ng.rotation = mouseAngle360;
      if(!shapes.some(s=>s._origId===origShape.id&&s.groupId===arrDragState.newGroupId)){
        const copy=makeCopy(origShape,arrDragState.newGroupId);
        arrSelShapeId=copy.id;
      }
    } else {
      // ctrl 뗐을 때: 생성된 새 그룹이 있으면 취소하고 snap 모드 복귀
      if(arrDragState.newGroupId !== null){
        groups = groups.filter(g => g.id !== arrDragState.newGroupId);
        shapes = shapes.filter(s => !(s._isCopy && s.groupId === arrDragState.newGroupId));
        arrDragState.newGroupId = null;
        arrSelShapeId = origShape.id;
        arrDragState.origGroupId = GROUP1_ID;
        refreshGroupList();
      }

      // 각도 기반 snap: 마우스 12시 각도와 각 그룹 rotation(0~360) 비교
      const SNAP_DEG = 25; // 25도 이내 snap
      let best=null, bestDiff=SNAP_DEG;
      groups.forEach(g=>{
        const gAngle = ((g.rotation % 360) + 360) % 360;
        const raw = Math.abs(mouseAngle360 - gAngle);
        const circDiff = Math.min(raw, 360 - raw);
        if(circDiff < bestDiff){ bestDiff = circDiff; best = g; }
      });
      if(best && arrDragState.origGroupId !== best.id){
        if(arrDragState.origGroupId !== GROUP1_ID){
          removeCopy(origShape.id, arrDragState.origGroupId);
        }
        if(best.id === GROUP1_ID){
          arrSelShapeId = origShape.id;
          arrDragState.origGroupId = GROUP1_ID;
        } else {
          const copy = makeCopy(origShape, best.id);
          arrSelShapeId = copy.id;
          arrDragState.origGroupId = best.id;
        }
      }
    }
    refreshGroupList();render();
  }
}

function mArrUp(pos,e){
  // 드래그가 있었으면 스냅셛 저장
  if(arrDragState && _hasDragged) saveSnapshot();
  arrDragState=null;render();
}

function mLblDown(pos,e){
  for(const s of shapes){
    if(!s.groupId)continue;
    const g=groups.find(x=>x.id===s.groupId);if(!g)continue;
    const lbl=labels[s.id]||{ox:4,oy:-4};
    const ctr=shapeCenter(s);
    const lp=rotAround(pos,circle.cx,circle.cy,-g.rotation);
    const fs=parseFloat(document.getElementById('label-size').value)||4;
    if(Math.hypot(lp.x-(ctr.x+lbl.ox),lp.y-(ctr.y+lbl.oy))<fs){
      lblDrag={shapeId:s.id,startLocal:lp,startOx:lbl.ox,startOy:lbl.oy};return;
    }
  }
  lblDrag=null;
}

function mLblMove(pos,e){
  if(!lblDrag)return;
  const s=shapes.find(x=>x.id===lblDrag.shapeId);if(!s)return;
  const g=groups.find(x=>x.id===s.groupId);
  const lp=g?rotAround(pos,circle.cx,circle.cy,-g.rotation):pos;
  let ox=lblDrag.startOx+(lp.x-lblDrag.startLocal.x);
  let oy=lblDrag.startOy+(lp.y-lblDrag.startLocal.y);
  const ctr=shapeCenter(s);
  const d=distToShape({x:ctr.x+ox,y:ctr.y+oy},s);
  if(d>MAX_LBL){
    const mag=Math.hypot(ox,oy)||1;let lo=0,hi=mag;
    for(let k=0;k<20;k++){const mid=(lo+hi)/2;if(distToShape({x:ctr.x+ox/mag*mid,y:ctr.y+oy/mag*mid},s)<=MAX_LBL)lo=mid;else hi=mid;}
    ox=ox/mag*lo;oy=oy/mag*lo;
  }
  if(!labels[s.id])labels[s.id]={ox:4,oy:-4};
  labels[s.id].ox=ox;labels[s.id].oy=oy;render();
}

function mLblUp(pos){lblDrag=null;render();}

function finishDrawing(){
  if(!drawingShape){drawing=false;return;}
  if(drawingShape.points.length>=2){
    if(drawingShape.type==='spline') updateHermiteTangents(drawingShape);
    shapes.push(drawingShape);
    saveSnapshot(); // 도형 그리기 완료 시 저장
  }
  drawingShape=null;drawing=false;render();
  triggerAutosave();
}

// --- ui.js --- 
function showContextMenu(e, items){
  const cm = document.getElementById('context-menu');
  cm.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('div');
    btn.textContent = item.label;
    btn.style.padding = '6px 12px';
    btn.style.fontSize = '12px';
    btn.style.color = '#eee';
    btn.style.cursor = 'pointer';
    btn.onmouseenter = () => btn.style.background = '#1a5a9a';
    btn.onmouseleave = () => btn.style.background = 'transparent';
    btn.onclick = (ev) => {
      ev.stopPropagation();
      item.action();
      cm.style.display = 'none';
    };
    cm.appendChild(btn);
  });
  cm.style.left = e.clientX + 'px';
  cm.style.top = e.clientY + 'px';
  cm.style.display = 'block';
}

function deleteSelectedShape(){
  if(selShapeId!==null){
    saveSnapshot(); // 삭제 전 저장
    shapes=shapes.filter(s=>s.id!==selShapeId);selShapeId=null;selPtIdx=null;dragState=null;
  }
  render();

function onPaperSizeChange(val) {
  if (val === 'Custom') {
    document.getElementById('cv-w').disabled = false;
    document.getElementById('cv-h').disabled = false;
  } else {
    document.getElementById('cv-w').disabled = true;
    document.getElementById('cv-h').disabled = true;
    if (val === 'A4') { paperGuide.w = 210; paperGuide.h = 297; }
    else if (val === 'A3') { paperGuide.w = 297; paperGuide.h = 420; }
    else if (val === 'Letter') { paperGuide.w = 215.9; paperGuide.h = 279.4; }
    document.getElementById('cv-w').value = paperGuide.w;
    document.getElementById('cv-h').value = paperGuide.h;
  }
  paperGuide.size = val;
  canvasW = paperGuide.w;
  canvasH = paperGuide.h;
  paperGuide.cx = canvasW / 2;
  paperGuide.cy = canvasH / 2;
  paperGuide.rotation = 0;
  circle.cx = canvasW / 2;
  circle.cy = canvasH / 2;
  setCanvasSize();
  render();
  triggerAutosave();
}

function onCustomPaperWH(axis, val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) {
    if (axis === 'w') { paperGuide.w = v; canvasW = v; }
    if (axis === 'h') { paperGuide.h = v; canvasH = v; }
    paperGuide.cx = canvasW / 2;
    paperGuide.cy = canvasH / 2;
    paperGuide.rotation = 0;
    circle.cx = canvasW / 2;
    circle.cy = canvasH / 2;
    setCanvasSize();
    render();
    triggerAutosave();
  }
}

function onImageObjectLoaded(img) {
  let w = paperGuide.w * 0.6;
  let h = w * img.height / img.width;
  if (h > paperGuide.h * 0.6) {
    h = paperGuide.h * 0.6;
    w = h * img.width / img.height;
  }
  images.push({
    id: nextImgId++,
    img: img,
    cx: paperGuide.cx,
    cy: paperGuide.cy,
    w: w,
    h: h,
    rotation: 0,
    opacity: 1.0
  });

  triggerAutosave();
}

function deleteGroup(id) {

  saveSnapshot();
  shapes=shapes.filter(s=>!(s.groupId===id&&s._isCopy));
  groups=groups.filter(g=>g.id!==id);
  refreshGroupList(); render(); triggerAutosave();
}

function hasCopy(origId)  { return shapes.some(s=>s._origId===origId); }

// 원본이 수정됐을 때 연결된 copy들에 형태 데이터를 동기화
function syncCopies(origShape) {
  shapes.forEach(s => {
    if (!s._isCopy || s._origId !== origShape.id) return;
    s.points = JSON.parse(JSON.stringify(origShape.points));
    s.type = origShape.type;
    s.closed = origShape.closed;
    s.strokeWidth = origShape.strokeWidth;
    if (origShape.opacity !== undefined) s.opacity = origShape.opacity;
  });
}

function makeCopy(orig, targetGid) {
  shapes=shapes.filter(s=>!(s._origId===orig.id&&s.groupId===targetGid));
  const c=JSON.parse(JSON.stringify(orig));
  c.id=nextShapeId++; c._isCopy=true; c._origId=orig.id; c.groupId=targetGid;
  shapes.push(c); return c;
}

function removeCopy(origId, targetGid) { shapes=shapes.filter(s=>!(s._origId===origId&&s.groupId===targetGid)); }

let scaleStartShapes = null;
let shapeScaleStartValue = 100;

function prepareShapeScale(val) {
  if (!scaleStartShapes) {
    saveSnapshot(); // Save history snapshot BEFORE modification
    scaleStartShapes = JSON.parse(JSON.stringify(shapes));
    shapeScaleStartValue = parseFloat(val) || 100;
  }
}

function onShapeScaleRange(val) {
  const v = parseFloat(val);
  if (isNaN(v)) return;
  if (v < 10) return;
  
  prepareShapeScale(v);
  
  const s = v / shapeScaleStartValue;
  shapes = JSON.parse(JSON.stringify(scaleStartShapes));
  shapes.forEach(shape => {
    shape.points.forEach(p => {
      p.x = circle.cx + (p.x - circle.cx) * s;
      p.y = circle.cy + (p.y - circle.cy) * s;
      if (p.inT) { p.inT.x *= s; p.inT.y *= s; }
      if (p.outT) { p.outT.x *= s; p.outT.y *= s; }
    });
  });
  document.getElementById('shape-scale-num').value = v.toFixed(0);
  render();
}

function onShapeScaleNum(val) {
  const v = parseFloat(val);
  if (isNaN(v)) return;
  if (v < 10) return;
  
  prepareShapeScale(v);
  
  const s = v / shapeScaleStartValue;
  shapes = JSON.parse(JSON.stringify(scaleStartShapes));
  shapes.forEach(shape => {
    shape.points.forEach(p => {
      p.x = circle.cx + (p.x - circle.cx) * s;
      p.y = circle.cy + (p.y - circle.cy) * s;
      if (p.inT) { p.inT.x *= s; p.inT.y *= s; }
      if (p.outT) { p.outT.x *= s; p.outT.y *= s; }
    });
  });
  document.getElementById('shape-scale-range').value = v;
  render();
}

function onShapeScaleChange() {
  if (scaleStartShapes) {
    saveSnapshot(); // Save history snapshot AFTER modification completes
    triggerAutosave();
    scaleStartShapes = null;
  }
}

// --- export.js --- 
async function saveProject(){
  const data={version:4,canvasW,canvasH,baseW,baseH,circle,shapes,groups,nextGroupId,labels,strokeWidth,bgColor:document.getElementById('cv-bg').value};
  const jsonStr = JSON.stringify(data, null, 2);
  
  if (window.showSaveFilePicker && currentFileHandle) {
    try {
      const options = { mode: 'readwrite' };
      if ((await currentFileHandle.queryPermission(options)) !== 'granted') {
        if ((await currentFileHandle.requestPermission(options)) !== 'granted') {
          alert('저장 권한이 거부되었습니다.');
          return;
        }
      }
      const writable = await currentFileHandle.createWritable();
      await writable.write(jsonStr);
      await writable.close();
    } catch (err) {
      console.warn('기존 파일 덮어쓰기 실패, 다른 이름으로 저장을 시도합니다.', err);
      await saveProjectAs();
    }
  } else {
    await saveProjectAs();
  }
}

async function saveProjectAs(){
  const data={version:4,canvasW,canvasH,baseW,baseH,circle,shapes,groups,nextGroupId,labels,strokeWidth,bgColor:document.getElementById('cv-bg').value};
  const jsonStr = JSON.stringify(data, null, 2);
  
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'rotadraw.rdraw',
        types: [{
          description: 'Rotadraw Project',
          accept: {
            'application/json': ['.rdraw', '.json']
          }
        }]
      });
      currentFileHandle = handle;
      const writable = await handle.createWritable();
      await writable.write(jsonStr);
      await writable.close();
    } catch (err) {
      if (err.name !== 'AbortError') {
        alert('저장 오류: ' + err.message);
      }
    }
  } else {
    const blob=new Blob([jsonStr],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rotadraw.rdraw';a.click();
  }
}

function applyProjectData(d){
  canvasW=d.canvasW||200;canvasH=d.canvasH||200;baseW=d.baseW||canvasW;baseH=d.baseH||canvasH;
  paperGuide.w = canvasW;
  paperGuide.h = canvasH;
  paperGuide.cx = canvasW / 2;
  paperGuide.cy = canvasH / 2;
  paperGuide.rotation = 0;
  circle=d.circle||{cx:100,cy:100,r:75};
  shapes=d.shapes||[];nextShapeId=shapes.reduce((m,s)=>Math.max(m,s.id+1),1);
  groups=d.groups||[];
  let g1 = groups.find(g => g.id === GROUP1_ID);
  if (!g1) {
    groups.unshift({id:GROUP1_ID,label:1,color:GCOLORS[0],rotation:0,locked:true});
  } else {
    g1.rotation = 0;
    g1.locked = true;
  }
  nextGroupId=d.nextGroupId||groups.reduce((m,g)=>Math.max(m,g.id+1),2);
  labels=d.labels||{};strokeWidth=d.strokeWidth||1;activeDrawGroupId=groups.find(g=>g.id===GROUP1_ID)?.id || groups[0].id;
  document.getElementById('cv-w').value=canvasW;document.getElementById('cv-h').value=canvasH;
  document.getElementById('cv-bg').value=d.bgColor||'#ffffff';
  document.getElementById('circle-d').value=(circle.r*2).toFixed(1);
  document.getElementById('sw-num').value=strokeWidth.toFixed(2);document.getElementById('sw-range').value=strokeWidth;
  refreshGroupList();setCanvasSize();render();
  triggerAutosave();
}

async function loadProject(){
  if (window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({
        types: [{
          description: 'Rotadraw Project',
          accept: {
            'application/json': ['.rdraw', '.json']
          }
        }]
      });
      currentFileHandle = handle;
      const file = await handle.getFile();
      const text = await file.text();
      const d = JSON.parse(text);
      applyProjectData(d);
    } catch (err) {
      if (err.name !== 'AbortError') {
        alert('불러오기 오류: ' + err.message);
      }
    }
  } else {
    document.getElementById('proj-input').click();
  }
}

}
